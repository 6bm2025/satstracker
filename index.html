// Streak helpers
function getStreakCount(practiseDates,streakSettings){
  if(!streakSettings||!streakSettings.active||!streakSettings.startDate||!streakSettings.endDate)return null;
  if(!practiseDates||!practiseDates.length)return 0;
  const start=new Date(streakSettings.startDate);
  const end=new Date(streakSettings.endDate);
  const today=new Date(isoToday());
  const effectiveEnd=end<today?end:today;
  let count=0;
  const d=new Date(start);
  while(d<=effectiveEnd){
    const iso=d.toISOString().slice(0,10);
    if(practiseDates.includes(iso))count++;
    d.setDate(d.getDate()+1);
  }
  return count;
}

// ── Fraction equality ─────────────────────────────────────────────────────────
function parseFracStr(s){
  s=s.trim().replace(/,/g,"");
  const mx=s.match(/^(\d+)\s+(\d+)\/(\d+)$/);if(mx)return{w:+mx[1],n:+mx[2],d:+mx[3]};
  const fx=s.match(/^(\d+)\/(\d+)$/);if(fx)return{w:0,n:+fx[1],d:+fx[2]};
  const wx=s.match(/^(\d+(?:\.\d+)?)$/);if(wx)return{w:+wx[1],n:0,d:1};
  return null;
}
function fractionsEqual(ua,ca){
  const a=parseFracStr(ua),b=parseFracStr(ca);if(!a||!b)return false;
  const na=a.w*a.d+a.n,nb=b.w*b.d+b.n;
  const ga=gcd(Math.abs(na),Math.abs(a.d)),gb=gcd(Math.abs(nb),Math.abs(b.d));
  return(na/ga===nb/gb)&&(a.d/ga===b.d/gb);
}
function answersMatch(ua,ca,isText){
  const u=ua.trim().replace(/,/g,"");const c=String(ca).trim().replace(/,/g,"");
  if(u.replace(/\s/g,"")=== c.replace(/\s/g,""))return true;
  if(isText&&fractionsEqual(u,c))return true;
  if(!isNaN(parseFloat(u))&&!isNaN(parseFloat(c))&&Math.abs(parseFloat(u)-parseFloat(c))<0.001)return true;
  return false;
}

// ── Fraction rendering ────────────────────────────────────────────────────────
function Frac({n,d,size}){
  return(
    <span style={{display:"inline-flex",flexDirection:"column",alignItems:"center",verticalAlign:"middle",margin:"0 3px",fontSize:size||"1em",lineHeight:1}}>
      <span style={{borderBottom:"1.5px solid currentColor",paddingBottom:"1px",textAlign:"center",minWidth:"1em"}}>{n}</span>
      <span style={{paddingTop:"1px",textAlign:"center",minWidth:"1em"}}>{d}</span>
    </span>
  );
}
function renderMath(text,size){
  if(!text||typeof text!=="string")return text;
  const parts=[];const re=/(\d+)\s+(\d+)\/(\d+)|(\d+)\/(\d+)/g;let last=0,m;
  while((m=re.exec(text))!==null){
    if(m.index>last)parts.push(text.slice(last,m.index));
    if(m[1]!==undefined){parts.push(<span key={m.index} style={{display:"inline-flex",alignItems:"center",gap:"2px"}}><span>{m[1]}</span><Frac n={m[2]} d={m[3]} size={size}/></span>);}
    else{parts.push(<Frac key={m.index} n={m[4]} d={m[5]} size={size}/>);}
    last=m.index+m[0].length;
  }
  if(last<text.length)parts.push(text.slice(last));
  return parts.length?parts:text;
}

function Btn({children,onClick,color,textColor,style,disabled}){

// ── ColHint components (column-format working) ────────────────────────────────
// ── Column colours: O=pink, T=blue, H=green, Th=purple ───────────────────────
const HC=["#c0392b","#2980b9","#27ae60","#7c3aed","#e67e22"];
const HL=["O","T","H","Th","TTh"];
const CW=44; // cell width px

function htoHeader(maxLen){
  return(
    <div style={{display:"flex",gap:3,marginBottom:6}}>
      <div style={{width:30,flexShrink:0}}/>
      {Array.from({length:maxLen}).map(function(_,ci){
        const pos=maxLen-1-ci;const c=HC[pos]||"#888";const lbl=HL[pos]||"?";
        return <div key={ci} style={{width:CW,height:30,background:c,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:900,color:"#fff",flexShrink:0}}>{lbl}</div>;
      })}
    </div>
  );
}
function htoDigitRow(numStr,sym,maxLen){
  const padded=numStr.padStart(maxLen,"0");
  return(
    <div style={{display:"flex",alignItems:"center",gap:3,marginBottom:2}}>
      <div style={{width:30,textAlign:"center",fontSize:22,fontWeight:900,color:"#333",flexShrink:0}}>{sym}</div>
      {padded.split("").map(function(d,ci){
        const pos=maxLen-1-ci;const c=HC[pos]||"#888";
        const invisible=d==="0"&&numStr.replace(/^0+/,"").length<maxLen-ci;
        return <div key={ci} style={{width:CW,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,fontWeight:900,color:invisible?"transparent":c,fontFamily:"system-ui",flexShrink:0}}>{d}</div>;
      })}
    </div>
  );
}
function htoDivLine(maxLen){
  return <div style={{borderTop:"3px solid #222",margin:"3px 0 3px 33px"}}/>;
}

function ColHintAdd({nums,answer,hideAnswer}){
  const maxLen=Math.max(...nums.map(function(n){return String(n).length;}),String(answer).length);
  const carries=new Array(maxLen).fill(0);
  let carry=0;

    const s=nums.reduce(function(acc,n){return acc+(parseInt(String(n).padStart(maxLen,"0")[p])||0);},0)+carry;
    carry=Math.floor(s/10);if(p>0)carries[p-1]=carry;
  }

          </div>)

        <div style={{display:"flex",gap:3}}>
          <div style={{width:30,flexShrink:0}}/>

        </div>

  );
}
function ColHintSub({top,bot,answer,hideAnswer}){

          </div>)
        :(<div style={{display:"flex",alignItems:"center",gap:3}}>
            <div style={{width:30,flexShrink:0}}/>
            {pAns.map(function(d,ci){const pos=len-1-ci;const c=HC[pos]||"#888";const inv=d===0&&ci<len-1;return <div key={ci} style={{width:CW,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,fontWeight:900,color:inv?"transparent":c,flexShrink:0}}>{inv?"":d}</div>;})}

}

}
function renderColHint(ch,hideAnswer){

  if(ch.type==="shortMult")return<ColHintShortMult {...ch} hideAnswer={hideAnswer}/>;
  if(ch.type==="longMult")return<ColHintLongMult {...ch} hideAnswer={hideAnswer}/>;
  return null;
}

// Place value colour-coded expansion
function ColHintPlaceValue({num,missingPos}){

// Decimal subtraction colour-coded column layout
function ColHintDecSub({top,bot,answer,hideAnswer}){
  const PC=["#c0392b","#2980b9","#27ae60","#7c3aed"];
  const PL=["1/10","O","T","H"];

  const CW=28,DW=14,SW=28;

    const s=n.toFixed(1);const parts=s.split(".");
    const int=parts[0],dec=parts[1]||"0";
    if(pos===-1)return dec[0]||"0";
    const fr=int.length-1-pos;

        {SLOTS.map(function(sl,i){
          if(sl.pos==="dot")return<div key={i} style={{width:DW,textAlign:"center",fontSize:22,fontWeight:900,color:"#555",flexShrink:0}}>.</div>;
          const d=getDigit(n,sl.pos);

          return<div key={i} style={{width:CW,textAlign:"center",fontSize:22,fontWeight:900,color:clr,flexShrink:0}}>{disp}</div>;

// Place value grid with arrows for ×÷ powers of 10 (pure HTML, real-position system)
function PlaceValueGrid({before,after,shift,showArrows}){
  const COL_DEFS=[
    {realPos:5,line1:"100,000s",line2:"",   col:"#be185d"},
    {realPos:4,line1:"10,000s", line2:"",   col:"#b45309"},
    {realPos:3,line1:"1,000s",  line2:"",   col:"#7c3aed"},
    {realPos:2,line1:"100s",    line2:"",   col:"#27ae60"},
    {realPos:1,line1:"10s",     line2:"",   col:"#2980b9"},
    {realPos:0,line1:"1s",      line2:"",   col:"#c0392b"},
    {realPos:null,line1:"",     line2:"",   col:"#555",isDot:true},
    {realPos:-1,line1:"1",      line2:"10", col:"#e67e22",isFrac:true},
    {realPos:-2,line1:"1",      line2:"100",col:"#16a085",isFrac:true},
    {realPos:-3,line1:"1",      line2:"1000",col:"#8e44ad",isFrac:true},
  ];
  const CW=38,DW=12,HDR_H=44;
  function parseDigits(n){
    const s=String(parseFloat(Number(n).toFixed(5)));
    const dp=s.indexOf(".");
    const intP=dp>=0?s.slice(0,dp):s;
    const decP=dp>=0?s.slice(dp+1):"";
    const res=[];
    for(let i=0;i<intP.length;i++)res.push({realPos:i,d:intP[intP.length-1-i]});
    for(let i=0;i<decP.length&&i<3;i++)res.push({realPos:-(i+1),d:decP[i]});
    return res;
  }
  const dBefore=parseDigits(before);
  const dAfter=parseDigits(after);
  const allRP=[...dBefore,...dAfter].map(function(x){return x.realPos;});
  const minRP=Math.min(...allRP),maxRP=Math.min(5,Math.max(...allRP));
  const hasDec=allRP.some(function(r){return r<0;});
  const hasInt=allRP.some(function(r){return r>=0;});
  const visCols=COL_DEFS.filter(function(c){
    if(c.isDot)return hasDec&&hasInt;
    return c.realPos>=minRP&&c.realPos<=maxRP;
  });
  const xCentre={};
  let xAcc=0;
  visCols.forEach(function(c){
    const w=c.isDot?DW:CW;
    if(c.isDot)xCentre["dot"]=xAcc+w/2;
    else xCentre[c.realPos]=xAcc+w/2;
    xAcc+=w+1;
  });
  const totalW=xAcc;
  const mapB={},mapA={};
  dBefore.forEach(function(x){mapB[x.realPos]=x.d;});
  dAfter.forEach(function(x){mapA[x.realPos]=x.d;});
  function renderHeader(){
    return visCols.map(function(c,i){
      if(c.isDot)return(<div key={i} style={{width:DW,flexShrink:0,height:HDR_H}}/>);
      return(
        <div key={i} style={{width:CW,flexShrink:0,background:c.col,borderRadius:6,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:HDR_H,marginRight:1,padding:"2px 1px"}}>
          {c.isFrac
            ?<><span style={{fontSize:9,fontWeight:900,color:"#fff",lineHeight:1.2}}>1</span><span style={{fontSize:8,fontWeight:900,color:"#fff",lineHeight:1}}>───</span><span style={{fontSize:9,fontWeight:900,color:"#fff",lineHeight:1.2}}>{c.line2}</span></>
            :<><span style={{fontSize:9,fontWeight:900,color:"#fff",lineHeight:1.3,textAlign:"center"}}>{c.line1}</span></>
          }
        </div>
      );
    });
  }
  function renderRow(map){
    const showDot=hasDec&&hasInt;
    return visCols.map(function(c,i){
      if(c.isDot)return(<div key={i} style={{width:DW,flexShrink:0,textAlign:"center",fontSize:22,fontWeight:900,color:showDot?"#555":"transparent"}}>.</div>);
      const d=map[c.realPos];
      const has=d!==undefined;
      return(<div key={i} style={{width:CW,height:44,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:900,color:has?c.col:"transparent"}}>{has?d:""}</div>);
    });
  }
  function renderArrows(){
    const H=46;
    const lines=dBefore.map(function(item,i){
      const targetRP=item.realPos+shift;
      const x1=xCentre[item.realPos],x2=xCentre[targetRP];
      if(x1===undefined||x2===undefined)return null;
      const y1=8,y2=H-10;
      const ang=Math.atan2(y2-y1,x2-x1),hs=7;
      return(
        <g key={i}>
          <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="#e74c3c" strokeWidth="2.5"/>
          <polygon points={x2+","+y2+" "+(x2-hs*Math.cos(ang-0.4))+","+(y2-hs*Math.sin(ang-0.4))+" "+(x2-hs*Math.cos(ang+0.4))+","+(y2-hs*Math.sin(ang+0.4))} fill="#e74c3c"/>
        </g>
      );
    }).filter(Boolean);
    if(!lines.length)return null;
    return(<svg width={totalW} height={H} style={{display:"block",overflow:"visible"}}>{lines}</svg>);
  }
  const isMultiply=shift>0;
  const textExpl=isMultiply
    ?"Multiply: digits jump left.  ×10 = 1 jump,  ×100 = 2 jumps,  ×1000 = 3 jumps"
    :"Divide: digits jump right.  ÷10 = 1 jump,  ÷100 = 2 jumps,  ÷1000 = 3 jumps";
  return(
    <div style={{display:"inline-block",background:"#fff",borderRadius:10,border:"2px solid #e5e7eb",padding:"10px 12px",marginBottom:8}}>
      <div style={{fontSize:12,fontWeight:700,color:"#555",marginBottom:8,fontFamily:"system-ui"}}>{textExpl}</div>
      <div style={{display:"flex",marginBottom:4}}>{renderHeader()}</div>
      <div style={{display:"flex"}}>{renderRow(mapB)}</div>
      {showArrows
        ?<div style={{padding:"3px 0"}}>{renderArrows()}</div>
        :<div style={{borderTop:"2px solid #ccc",margin:"2px 0"}}/>
      }
      <div style={{display:"flex"}}>{renderRow(mapA)}</div>
    </div>
  );
}


// Adding fractions visual with arrows (topic 16)
function FracAddVisual({n1,d1,n2,d2,hideAnswer}){
  const gcdF=function(a,b){return b===0?a:gcdF(b,a%b);};
  const lcmF=function(a,b){return a*b/gcdF(a,b);};
  const cd=lcmF(d1,d2),fM1=cd/d1,fM2=cd/d2,en1=n1*fM1,en2=n2*fM2,sumN=en1+en2;
  const g=gcdF(sumN,cd),ansN=sumN/g,ansD=cd/g;
  const whole=Math.floor(ansN/ansD),remN=ansN%ansD;
  const ansStr=whole>0?(remN>0?whole+" "+remN+"/"+ansD:String(whole)):ansN+"/"+ansD;
  const C1="#e74c3c",C2="#2980b9",FS=20;
  const FW=44,OPW=32;
  // x centres of each fraction slot — computed from slot edges, not relative offsets
  const xF1=FW/2;                          // 22
  const xF2=FW+OPW+FW/2;                  // 98
  const xEF1=2*(FW+OPW)+FW/2;             // 174
  const xEF2=3*(FW+OPW)+FW/2;             // 250
  const totalW=4*FW+3*OPW+8;              // 280
  const PAD=44;
  const fracH=FS*2+8;
  const midY=PAD+fracH/2;
  const topY=PAD+4;
  const botY=PAD+fracH-4;
  const svgH=PAD*2+fracH;
  function arc(x1,y1,x2,y2,col,label,above){
    const cpY=above?Math.min(y1,y2)-36:Math.max(y1,y2)+36;
    const mx=(x1+x2)/2;
    const t=0.93;
    const bx=(1-t)*(1-t)*x1+2*(1-t)*t*mx+t*t*x2;
    const by=(1-t)*(1-t)*y1+2*(1-t)*t*cpY+t*t*y2;
    const ang=Math.atan2(y2-by,x2-bx);
    const hs=7;
    const px1=x2-hs*Math.cos(ang-0.4);
    const py1=y2-hs*Math.sin(ang-0.4);
    const px2=x2-hs*Math.cos(ang+0.4);
    const py2=y2-hs*Math.sin(ang+0.4);
    const lx=mx;
    const ly=above?cpY+8:cpY-8;
    const pts=x2+","+y2+" "+px1+","+py1+" "+px2+","+py2;
    return(
      <g key={x1+"-"+x2+"-"+above}>
        <path d={"M"+x1+","+y1+" Q"+mx+","+cpY+" "+x2+","+y2} stroke={col} strokeWidth="2.5" fill="none"/>
        <polygon points={pts} fill={col}/>
        <rect x={lx-15} y={ly-9} width="30" height="18" rx="4" fill={col}/>
        <text x={lx} y={ly+5} textAnchor="middle" fontSize="11" fontWeight="900" fontFamily="system-ui" fill="#fff">{"x"+label}</text>
      </g>
    );
  }
  function Fr({n,d,col,cx}){
    const lw=String(Math.max(n,d)).length*10+8;
    return(
      <g>
        <text x={cx} y={midY-FS*0.2} textAnchor="middle" fontSize={FS} fontWeight="900" fontFamily="system-ui" fill={col}>{n}</text>
        <line x1={cx-lw/2} y1={midY+4} x2={cx+lw/2} y2={midY+4} stroke={col} strokeWidth="2.5" strokeLinecap="round"/>
        <text x={cx} y={midY+FS+6} textAnchor="middle" fontSize={FS} fontWeight="900" fontFamily="system-ui" fill={col}>{d}</text>
      </g>
    );
  }
  function Op({sym,cx}){
    return <text x={cx} y={midY+8} textAnchor="middle" fontSize={FS+4} fontWeight="900" fontFamily="system-ui" fill="#555">{sym}</text>;
  }
  const opX1=FW+OPW/2;                    // 60
  const opEq=2*FW+OPW+OPW/2;             // 136
  const opX2=3*FW+2*OPW+OPW/2;           // 212
  return(
    <div style={{display:"inline-block",marginBottom:8}}>
      <svg width={totalW} height={svgH} style={{display:"block",overflow:"visible"}}>
        <Fr n={n1} d={d1} col={C1} cx={xF1}/>
        <Op sym="+" cx={opX1}/>
        <Fr n={n2} d={d2} col={C2} cx={xF2}/>
        <Op sym="=" cx={opEq}/>
        <Fr n={en1} d={cd} col={C1} cx={xEF1}/>
        <Op sym="+" cx={opX2}/>
        <Fr n={en2} d={cd} col={C2} cx={xEF2}/>
        {arc(xF1,topY,xEF1,topY,C1,fM1,true)}
        {arc(xF1,botY,xEF1,botY,C1,fM1,false)}
        {arc(xF2,topY,xEF2,topY,C2,fM2,true)}
        {arc(xF2,botY,xEF2,botY,C2,fM2,false)}
      </svg>
      {hideAnswer
        ?<div style={{fontSize:FS,fontWeight:900,color:"#bbb",fontFamily:"system-ui",marginTop:4}}>= ?</div>
        :<div style={{fontSize:FS,fontWeight:900,fontFamily:"system-ui",marginTop:4,display:"flex",alignItems:"center",gap:6}}>
          <span style={{color:"#555"}}>= </span>
          <span style={{display:"inline-flex",flexDirection:"column",alignItems:"center",gap:1}}>
            <span style={{fontSize:FS,fontWeight:900,color:"#555",fontFamily:"system-ui",lineHeight:1}}>{sumN}</span>

            <span style={{fontSize:FS,fontWeight:900,color:"#555",fontFamily:"system-ui",lineHeight:1}}>{cd}</span>
          </span>
          {ansStr!==sumN+"/"+cd&&<span style={{color:"#555"}}> = </span>}
          {ansStr!==sumN+"/"+cd&&<span style={{fontSize:FS,fontWeight:900,color:"#27ae60",fontFamily:"system-ui"}}>{ansStr}</span>}
        </div>
      }

}

// Topic 22/23 — Decimal column layout (add or sub) using existing ColHintDecSub style but for dec+dec
function DecimalColVisual({top,bot,answer,op,hideAnswer}){
  const PC=["#c0392b","#2980b9","#27ae60","#7c3aed"];
  const PL=["1/10","O","T","H"];
  const SLOTS=[{pos:2,li:3},{pos:1,li:2},{pos:0,li:1},{pos:"dot"},{pos:-1,li:0}];
  const CW=30,DW=12,SW=28;
  function getDigit(n,pos){
    const s=n.toFixed(1);const parts=s.split(".");
    const int=parts[0],dec=parts[1]||"0";
    if(pos===-1)return dec[0]||"0";
    const fr=int.length-1-pos;
    return(fr<0||fr>=int.length)?null:int[fr];
  }
  // Compute exchanges for subtraction
  const exchFrom=[false,false,false],exchTo=[false,false,false];
  if(op==="sub"){
    const tS=top.toFixed(1).replace(".","").split("").map(Number);
    const bS=bot.toFixed(1).replace(".","").split("").map(Number);
    while(tS.length<bS.length)tS.unshift(0);
    while(bS.length<tS.length)bS.unshift(0);
    const tW=[...tS];
    for(let i=tW.length-1;i>=0;i--){
      if(tW[i]<bS[i]){
        tW[i]+=10;
        for(let j=i-1;j>=0;j--){
          if(tW[j]>0){tW[j]-=1;break;}
        }
      }
    }
  }
  function hdrRow(n){
    return(
      <div style={{display:"flex",alignItems:"center",marginBottom:4}}>
        <div style={{width:SW,flexShrink:0}}/>
        {SLOTS.map(function(sl,i){
          if(sl.pos==="dot")return<div key={i} style={{width:DW,flexShrink:0}}/>;
          const d=getDigit(n,sl.pos);
          if(d===null)return<div key={i} style={{width:CW,flexShrink:0}}/>;
          const col=PC[sl.li];
          return<div key={i} style={{width:CW,height:20,background:col,borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,color:"#fff",flexShrink:0}}>{PL[sl.li]}</div>;
        })}
      </div>
    );
  }
  function numRow(n,sym,hideAns,isAns){
    return(
      <div style={{display:"flex",alignItems:"center",marginBottom:2}}>
        <div style={{width:SW,textAlign:"right",fontSize:18,fontWeight:800,color:"#333",flexShrink:0,paddingRight:4}}>{sym}</div>
        {SLOTS.map(function(sl,i){
          if(sl.pos==="dot")return<div key={i} style={{width:DW,flexShrink:0,textAlign:"center",fontSize:20,fontWeight:900,color:"#555"}}>.</div>;
          const d=getDigit(n,sl.pos);
          const blank=d===null;
          const col=PC[sl.li];
          const disp=(hideAns&&isAns)?"?":(blank?"":d);
          const clr=(hideAns&&isAns)?"#bbb":(blank?"transparent":col);
          return<div key={i} style={{width:CW,height:38,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:900,color:clr}}>{disp}</div>;
        })}
      </div>
    );
  }
  // Carries for addition
  function carriesRow(t,b){
    const tS=String(Math.round(t*10)).split("").map(Number);
    const bS=String(Math.round(b*10)).split("").map(Number);
    while(tS.length<bS.length)tS.unshift(0);
    while(bS.length<tS.length)bS.unshift(0);
    const carries=new Array(tS.length).fill(0);
    let c=0;
    for(let i=tS.length-1;i>=0;i--){
      const s=tS[i]+bS[i]+c;c=Math.floor(s/10);
      if(i>0)carries[i-1]=c;c=Math.floor(s/10);
    }
    const hasCar=carries.some(function(x){return x>0;});
    if(!hasCar)return null;
    return(
      <div style={{display:"flex",alignItems:"center"}}>
        <div style={{width:SW,flexShrink:0}}/>
        {SLOTS.map(function(sl,i){
          if(sl.pos==="dot")return<div key={i} style={{width:DW,flexShrink:0}}/>;
          // map slot position to carry array index
          const d=getDigit(top,sl.pos);
          const col=PC[sl.li];
          // carries indexed from right of integer portion; pos 0=ones, -1=tenths
          // carry at pos p comes from pos p-1 (one to right)
          // for decimal: tenths=pos-1 (index 0 of *10 representation), ones=index1, tens=index2
          const carryIdx=sl.pos===-1?0:sl.pos===0?1:sl.pos===1?2:sl.pos===2?3:-1;
          const cv=carryIdx>=0&&carryIdx<carries.length?carries[carryIdx]:0;
          return<div key={i} style={{width:CW,height:16,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,color:cv?col:"transparent"}}>{cv||""}</div>;
        })}
      </div>
    );
  }
  const opSym=op==="add"?"+":"−";
  return(
    <div style={{display:"inline-block",background:"#fff",borderRadius:8,padding:"8px 10px",border:"2px solid #e5e7eb",marginBottom:8}}>
      {hdrRow(top)}
      {numRow(top,"",false,false)}
      {numRow(bot,opSym,false,false)}
      <div style={{borderTop:"3px solid #222",margin:"2px 0",marginLeft:SW}}/>
      {numRow(answer,"",hideAnswer,true)}
      {op==="add"&&(
        <>
          <div style={{borderTop:"2px solid #aaa",margin:"1px 0",marginLeft:SW}}/>
          {carriesRow(top,bot)}
        </>
      )}
    </div>
  );
}

        <div style={{borderRadius:12,padding:"14px 12px 16px",background:"#fff8e6",border:"2px solid #f5c842",display:"flex",flexDirection:"column",alignItems:"center"}}>

          <div style={{fontSize:"0.7rem",color:"#92400e",fontWeight:700,marginBottom:12,textAlign:"center",fontStyle:"italic"}}>Tip: write out multiples of {divisor} first!</div>
          <div style={{display:"inline-flex",alignItems:"flex-end",lineHeight:1}}>
            <div style={{fontSize:"1.1rem",fontWeight:800,color:"#4a2fa8",height:dh,display:"flex",alignItems:"center",marginRight:4}}>{divisor}</div>
            <div style={{display:"flex",flexDirection:"column"}}>
              <div style={{display:"flex",paddingLeft:6}}>
                {steps.map(function(s,i){return(<div key={i} style={{width:dw,height:dh,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",fontWeight:800,color:"#1a1a1a"}}>{s.q}</div>);})}
              </div>
              <div style={{display:"flex",borderTop:bw+" solid "+bc,borderLeft:bw+" solid "+bc,paddingTop:2,paddingLeft:5}}>
                {dvdStr.split("").map(function(d,i){
                  const prevRem=i===0?0:steps[i-1].rem;
                  return(<div key={i} style={{width:dw,height:dh,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",fontWeight:800,color:"#c45000",position:"relative"}}>
                    {prevRem>0&&<span style={{position:"absolute",top:1,left:1,fontSize:"0.5rem",fontWeight:900,color:"#e05a00",lineHeight:1}}>{prevRem}</span>}
                    {d}
                  </div>);
                })}
              </div>
            </div>
          </div>
          <div style={{marginTop:12,width:"100%",fontSize:"0.75rem",fontWeight:700,color:"#333",display:"flex",flexDirection:"column",gap:5}}>
            {steps.map(function(s,i){return(<div key={i} style={{display:"flex",alignItems:"flex-start",gap:5}}>
              {stepBadge("D","#fde68a","#78350f")}
              <span>{s.cur} ÷ {divisor} = <b>{s.q}</b>{s.rem>0?<>, rem <b style={{color:"#e05a00"}}>{s.rem}</b> — carry</>:<> — done!</>}</span>
            </div>);})}
          </div>
          {!hideAnswer&&<div style={{marginTop:10,background:"#d4edda",border:"2px solid #4caf50",borderRadius:7,padding:"4px 14px",fontSize:"0.85rem",fontWeight:900,color:"#1a5c2a"}}>✅ Answer = {quotient}{finalRem>0?" remainder "+finalRem:""}</div>}
        </div>
        {/* LONG DIVISION */}
        <div style={{borderRadius:12,padding:"14px 12px 16px",background:"#e8f5ff",border:"2px solid #5aade8",display:"flex",flexDirection:"column",alignItems:"center"}}>
          <div style={{fontSize:"0.72rem",fontWeight:900,textTransform:"uppercase",letterSpacing:1,marginBottom:4,padding:"3px 10px",borderRadius:20,background:"#5aade8",color:"#003d6b"}}>📐 Long Division (DMSB)</div>
          <div style={{fontSize:"0.7rem",color:"#1e3a8a",fontWeight:700,marginBottom:12,textAlign:"center",fontStyle:"italic"}}>Divide, Multiply, Subtract, Bring down — repeat!</div>
          <div style={{display:"inline-flex",alignItems:"flex-start",lineHeight:1}}>
            {/* Divisor: pushed down exactly one row (past quotient) via flex column */}
            <div style={{display:"flex",flexDirection:"column"}}>
              <div style={{height:dh}}/>
              <div style={{height:dh,display:"flex",alignItems:"center",paddingRight:5,borderRight:bw+" solid "+bc,fontSize:"1.1rem",fontWeight:800,color:"#4a2fa8"}}>{divisor}</div>
            </div>
            {/* Quotient + bracketed content */}
            <div style={{display:"flex",flexDirection:"column"}}>
              <div style={{display:"flex",paddingLeft:4}}>
                {steps.map(function(s,i){return(<div key={i} style={{width:dw,height:dh,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",fontWeight:800,color:"#c00"}}>{s.q}</div>);})}
              </div>
              {/* borderTop+borderLeft on SAME element = proper right-angle corner */}
              <div style={{borderTop:bw+" solid "+bc,paddingLeft:4}}>
                <div style={{display:"flex"}}>
                  {dvdStr.split("").map(function(d,i){return(<div key={i} style={{width:dw,height:dh,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",fontWeight:800,color:"#333"}}>{d}</div>);})}
                </div>
                <div>
                  {steps.map(function(s,i){
                    const mStr=String(s.mult);
                    const mLeft=Math.max(0,s.col-mStr.length+1);
                    const remStr=String(s.rem);
                    const remLeft=s.rem>0?Math.max(0,s.col-remStr.length+1):s.col+1;
                    return(<div key={i}>
                      {/* Subtract row: marginLeft:-16 pulls minus sign left so digits align */}
                      <div style={{display:"flex",alignItems:"center",marginLeft:-16}}>
                        <span style={{width:16,textAlign:"center",color:"#0057b7",fontWeight:800,fontSize:"0.9rem",flexShrink:0}}>−</span>
                        {Array(mLeft).fill(null).map(function(_,j){return<div key={j} style={{width:dw,height:dh}}/>;}) }
                        {mStr.split("").map(function(d,j){return(<div key={j} style={{width:dw,height:dh,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",fontWeight:800,color:"#0057b7"}}>{d}</div>);})}
                      </div>
                      <div style={{height:2,background:"#aaa",marginLeft:mLeft*dw,width:mStr.length*dw}}/>
                      {/* Bring-down row (not last step) */}
                      {i<steps.length-1&&(
                        <div style={{display:"flex"}}>
                          {Array(remLeft).fill(null).map(function(_,j){return<div key={j} style={{width:dw,height:dh}}/>;}) }
                          {s.rem>0&&remStr.split("").map(function(d,j){return(<div key={j} style={{width:dw,height:dh,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",fontWeight:800}}>{d}</div>);})}
                          <div style={{width:dw,height:dh,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",fontWeight:800,color:"#e05a00"}}>{dvdStr[i+1]}</div>
                        </div>
                      )}
                      {/* Final remainder */}
                      {i===steps.length-1&&(
                        <div style={{display:"flex"}}>
                          {Array(remLeft).fill(null).map(function(_,j){return<div key={j} style={{width:dw,height:dh}}/>;}) }
                          {remStr.split("").map(function(d,j){return(<div key={j} style={{width:dw,height:dh,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",fontWeight:800,color:"#2a7a00"}}>{d}</div>);})}
                        </div>
                      )}
                    </div>);
                  })}
                </div>
              </div>
            </div>
          </div>
          <div style={{marginTop:12,width:"100%",fontSize:"0.73rem",fontWeight:700,color:"#333",display:"flex",flexDirection:"column",gap:4}}>
            {steps.map(function(s,i){
              const items=[
                <div key={"d"+i} style={{display:"flex",alignItems:"flex-start",gap:5}}>{stepBadge("D","#fde68a","#78350f")}<span>How many times does {divisor} go into {s.cur}? → <b>{s.q}</b></span></div>,
                <div key={"m"+i} style={{display:"flex",alignItems:"flex-start",gap:5}}>{stepBadge("M","#bbf7d0","#14532d")}<span>{s.q} × {divisor} = <b>{s.mult}</b></span></div>,
                <div key={"s"+i} style={{display:"flex",alignItems:"flex-start",gap:5}}>{stepBadge("S","#bfdbfe","#1e3a8a")}<span>{s.cur} − {s.mult} = <b>{s.rem}</b></span></div>
              ];
              if(i<steps.length-1)items.push(<div key={"b"+i} style={{display:"flex",alignItems:"flex-start",gap:5}}>{stepBadge("B","#fce7f3","#831843")}<span>Bring down the <b>{dvdStr[i+1]}</b> → <b>{(s.rem>0?String(s.rem):"")+dvdStr[i+1]}</b></span></div>);
              return items;
            })}
          </div>
          <div style={{marginTop:6,fontSize:"0.65rem",color:"#666",fontWeight:700}}>D=Divide · M=Multiply · S=Subtract · B=Bring down</div>
          {!hideAnswer&&<div style={{marginTop:8,background:"#d4edda",border:"2px solid #4caf50",borderRadius:7,padding:"4px 14px",fontSize:"0.85rem",fontWeight:900,color:"#1a5c2a"}}>✅ Answer = {quotient}{finalRem>0?" remainder "+finalRem:""}</div>}
        </div>
      </div>
      <div style={{marginTop:10,background:"#f3f0ff",borderRadius:8,padding:"8px 12px",fontSize:"0.78rem",color:"#5a3fa8",fontWeight:700,textAlign:"center"}}>💡 Both methods give the same answer — use whichever your teacher prefers!</div>
    </div>
  );
}

function LineGraph({papers,onClickPaper}){
  if(!papers||papers.length===0)return <p style={{color:C.textL,textAlign:"center",padding:20,fontSize:14}}>No full papers completed yet!</p>;
  const W=500,H=200,pl=52,pr=24,pt=24,pb=56;const pw=W-pl-pr,ph=H-pt-pb;
  const pts=papers.map(function(p,i){return{x:pl+(papers.length===1?pw/2:i*(pw/(papers.length-1))),y:pt+ph-(p.score/40)*ph,score:p.score,date:p.date,i:i};});
  const pathD=pts.map(function(p,i){return(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1);}).join(" ");
  return(
    <div style={{overflowX:"auto"}}>
      <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",maxWidth:W,display:"block",margin:"0 auto"}}>
        {[0,10,20,30,40].map(function(v){const y=pt+ph-(v/40)*ph;return <g key={v}><line x1={pl} y1={y} x2={W-pr} y2={y} stroke="#e5e7eb" strokeWidth={1}/><text x={pl-8} y={y+4} textAnchor="end" fontSize={10} fill={C.textL}>{v}</text></g>;})}
        {pts.length>1&&<path d={pathD} fill="none" stroke={C.primary} strokeWidth={2.5} strokeLinejoin="round"/>}
        {pts.map(function(p,idx){return(<g key={idx} style={{cursor:onClickPaper?"pointer":"default"}} onClick={function(){if(onClickPaper)onClickPaper(p.i);}}><circle cx={p.x} cy={p.y} r={onClickPaper?7:5} fill={C.primary} stroke="#fff" strokeWidth={2}/><text x={p.x} y={p.y-11} textAnchor="middle" fontSize={11} fontWeight="bold" fill={C.primary}>{p.score}</text><text x={p.x} y={H-pb+16} textAnchor="middle" fontSize={9} fill={C.textL}>Attempt {idx+1}</text><text x={p.x} y={H-pb+28} textAnchor="middle" fontSize={8} fill={C.textL}>({p.date})</text></g>);})}
        <line x1={pl} y1={pt} x2={pl} y2={pt+ph} stroke="#9ca3af" strokeWidth={1.5}/>
        <line x1={pl} y1={pt+ph} x2={W-pr} y2={pt+ph} stroke="#9ca3af" strokeWidth={1.5}/>
      </svg>
    </div>
  );
}

// ── Review ────────────────────────────────────────────────────────────────────
function ReviewFlow({mistakes,onDone}){
  const[idx,setIdx]=useState(0);const[stage,setStage]=useState(1);const[ans,setAns]=useState("");const[checked,setChecked]=useState(false);const[wasCorrect,setWasCorrect]=useState(false);
  if(!mistakes||mistakes.length===0){return(<div style={{minHeight:"100vh",background:C.grayL,display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"system-ui"}}><Card style={{textAlign:"center",maxWidth:400,padding:40}}><div style={{fontSize:56}}>🎉</div><h2>No mistakes to review!</h2><Btn onClick={onDone}>Back to Dashboard</Btn></Card></div>);}
  const m=mistakes[idx],exp=getExp(m.topic),total=mistakes.length,videos=YT[m.topic]||[];
  const checkAns=function(){setWasCorrect(answersMatch(ans,m.answer,m.isText));setChecked(true);};
  const nextQ=function(){if(idx<total-1){setIdx(function(i){return i+1;});setStage(1);setAns("");setChecked(false);setWasCorrect(false);}else onDone();};
  const tryAgain=function(){setStage(function(s){return Math.min(s+1,3);});setAns("");setChecked(false);setWasCorrect(false);};
  return(
    <div style={{minHeight:"100vh",background:C.grayL,fontFamily:"system-ui",padding:20}}>
      <div style={{maxWidth:640,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{color:C.textL,fontSize:14,fontWeight:600}}>Mistake {idx+1} of {total}</span>
          <Btn onClick={onDone} color={C.grayL} textColor={C.text} style={{padding:"6px 14px",fontSize:13}}>Exit Review</Btn>
        </div>
        <PBar pct={(idx/total)*100} color={C.primary}/>
        <Card style={{marginTop:14}}>
          <div style={{display:"flex",gap:6,marginBottom:14}}>{[1,2,3].map(function(s){return <div key={s} style={{flex:1,height:5,borderRadius:99,background:s<=stage?C.primary:"#e5e7eb"}}/>;})}</div>
          <div style={{fontSize:11,color:C.textL,marginBottom:6,fontWeight:600}}>{stage===1?"Hint — try again!":stage===2?"Step-by-step guide":"Full solution"}</div>
          <div style={{fontSize:12,color:C.primary,fontWeight:700,marginBottom:8}}>{TOPIC_NAMES[m.topic]}</div>
          <div style={{border:"2px solid "+C.text,borderRadius:4,marginBottom:14,padding:"10px 14px",fontSize:18,fontWeight:700,fontFamily:"monospace"}}>{renderMath(m.question,"0.9em")}</div>
          {stage===1&&<NoteBox exp={{title:exp.title,text:exp.hint1,tip:exp.tip}} showExample={false} dynamicTip={m.divHint?"Write out multiples of "+m.divHint.divisor+" first!":null}/>}
          {stage===2&&(<div>{m.colHint?<CombinedHintBox exp={{title:"Step-by-step",text:exp.hint2,example:exp.example,tip:""}} colHint={m.colHint} hideAnswer={true}/>:m.pvHint?<ColHintPlaceValue {...m.pvHint}/>:m.decHint?<ColHintDecSub {...m.decHint} hideAnswer={true}/>:m.pvGridHint?<PlaceValueGrid {...m.pvGridHint} showArrows={true}/>:m.sdHint?<ColHintShortDiv {...m.sdHint} hideAnswer={true}/>:m.fracAddHint?<FracAddVisual {...m.fracAddHint} hideAnswer={true}/>:m.fracMixedHint?<FracMixedVisual {...m.fracMixedHint} hideAnswer={true}/>:m.fracSubHint?<FracSubVisual {...m.fracSubHint} hideAnswer={true}/>:m.fracSubMixedHint?<FracSubMixedVisual {...m.fracSubMixedHint} hideAnswer={true}/>:m.fracDivHint?<FracDivVisual {...m.fracDivHint} hideAnswer={true}/>:m.decColHint?<DecimalColVisual {...m.decColHint} hideAnswer={true}/>:m.divHint?null:<NoteBox exp={{title:"Step-by-step",text:exp.hint2,example:exp.example,tip:""}} showExample={true} dynamicHint={m.dynamicHint}/>}{m.divHint&&<DivisionExplanation dividend={m.divHint.dividend} divisor={m.divHint.divisor} hideAnswer={true}/>}</div>)}
          {stage===3&&(<div><div style={{background:C.greenL,borderRadius:8,padding:14,marginBottom:12}}><div style={{fontWeight:700,color:C.green,marginBottom:6,fontSize:18}}>Answer: {renderMath(String(m.answer),"0.9em")}</div>{m.colHint&&<div style={{marginBottom:6}}>{renderColHint(m.colHint)}</div>}{m.pvGridHint&&<div style={{marginBottom:6}}><PlaceValueGrid {...m.pvGridHint} showArrows={false}/></div>}{m.sdHint&&<div style={{marginBottom:6}}><ColHintShortDiv {...m.sdHint} hideAnswer={false}/></div>}{m.fracAddHint&&<FracAddVisual {...m.fracAddHint}/>}{m.fracMixedHint&&<FracMixedVisual {...m.fracMixedHint}/>}{m.fracSubHint&&<FracSubVisual {...m.fracSubHint}/>}{m.fracSubMixedHint&&<FracSubMixedVisual {...m.fracSubMixedHint}/>}{m.fracDivHint&&<FracDivVisual {...m.fracDivHint}/>}{m.decColHint&&<DecimalColVisual {...m.decColHint}/>}{!m.colHint&&!m.pvGridHint&&!m.sdHint&&!m.fracAddHint&&!m.fracMixedHint&&!m.fracSubHint&&!m.fracSubMixedHint&&!m.fracDivHint&&!m.decColHint&&m.dynamicHint&&<div style={{fontFamily:"monospace",fontSize:13,whiteSpace:"pre-wrap",background:"#fff",padding:8,borderRadius:6,border:"2px solid "+C.primary}}>{m.dynamicHint}</div>}{!m.colHint&&!m.dynamicHint&&m.working&&<div style={{fontFamily:"monospace",fontSize:13,whiteSpace:"pre-wrap",background:"#fff",padding:8,borderRadius:6}}>{m.working}</div>}</div>{m.divHint&&<DivisionExplanation dividend={m.divHint.dividend} divisor={m.divHint.divisor}/>}{videos.map(function(v,i){return <a key={i} href={v.url} target="_blank" rel="noreferrer" style={{display:"block",background:"#ef4444",color:"#fff",borderRadius:8,padding:"8px 14px",textDecoration:"none",fontWeight:700,fontSize:13,marginBottom:6}}>▶ Watch: {v.label}</a>;})} <Btn onClick={nextQ} style={{width:"100%",marginTop:4}}>{idx<total-1?"Next Mistake":"Finish Review"}</Btn></div>)}
          {stage<3&&!checked&&(<div style={{display:"flex",gap:8,marginTop:8}}><input value={ans} onChange={function(e){setAns(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")checkAns();}} placeholder="Your answer..." autoFocus style={{flex:1,border:"2px solid "+C.primary,borderRadius:8,padding:"10px 14px",fontSize:16,fontFamily:"monospace",outline:"none"}}/><Btn onClick={checkAns}>Check</Btn></div>)}
          {stage<3&&checked&&wasCorrect&&(<div style={{background:C.greenL,borderRadius:8,padding:16,textAlign:"center",marginTop:8}}><div style={{fontSize:36}}>🎉</div><div style={{fontWeight:800,color:C.green,fontSize:18,marginBottom:10}}>Correct!</div><Btn onClick={nextQ} color={C.green}>{idx<total-1?"Next Mistake":"Finish Review"}</Btn></div>)}
          {stage<3&&checked&&!wasCorrect&&(<div style={{background:C.redL,borderRadius:8,padding:14,textAlign:"center",marginTop:8}}><div style={{fontSize:28}}>❌</div><div style={{fontWeight:700,color:C.red,marginBottom:10}}>{stage===1?"Not quite — here is more help!":"Still not quite — let's see the solution"}</div><Btn onClick={tryAgain} color={stage===1?C.yellow:C.primary}>{stage===1?"More help":"Show answer"}</Btn></div>)}
          {stage<3&&videos.length>0&&<div style={{marginTop:14}}>{videos.map(function(v,i){return <a key={i} href={v.url} target="_blank" rel="noreferrer" style={{display:"block",background:"#ef4444",color:"#fff",borderRadius:8,padding:"8px 14px",textDecoration:"none",fontWeight:700,fontSize:13,marginBottom:6}}>▶ Watch: {v.label}</a>;})}</div>}
        </Card>
      </div>
    </div>
  );
}

// ── Question list / results ───────────────────────────────────────────────────
function QuestionList({results,onReviewAll,onReviewOne,onBack,score,maxMarks,date}){
  const mistakes=results.filter(function(r){return !r.correct;});
  const pct=Math.round((score/maxMarks)*100);
  return(

          {mistakes.length>0&&<Btn onClick={onReviewAll} style={{marginTop:12,width:"100%",padding:14,fontSize:15}}>Review all {mistakes.length} mistake{mistakes.length!==1?"s":""} in order</Btn>}
          {mistakes.length===0&&<div style={{background:C.greenL,borderRadius:8,padding:12,marginTop:12,fontSize:15,color:C.green,fontWeight:700}}>Perfect — no mistakes!</div>}
        </Card>

          <div style={{maxHeight:480,overflowY:"auto"}}>
            {results.map(function(r,i){return(<div key={i} onClick={function(){if(!r.correct)onReviewOne(r);}} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 10px",borderRadius:8,marginBottom:4,background:r.correct?"#f9fafb":"#fff",border:"1px solid "+(r.correct?"#e5e7eb":"#fca5a5"),cursor:r.correct?"default":"pointer"}}><span style={{fontSize:18,width:24,flexShrink:0}}>{r.correct?"✅":"❌"}</span><span style={{fontSize:12,color:C.textL,width:24,flexShrink:0,fontWeight:700}}>Q{i+1}</span><div style={{flex:1,minWidth:0}}><div style={{fontFamily:"monospace",fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.question}</div><div style={{fontSize:11,color:C.textL}}>{TOPIC_NAMES[r.topic]||r.topic}</div>{!r.correct&&<div style={{fontSize:11,color:C.red}}>Your answer: {r.userAnswer||"(blank)"} — Correct: {String(r.answer)}</div>}</div>{!r.correct&&<span style={{fontSize:12,color:C.primary,fontWeight:700,flexShrink:0}}>Review →</span>}</div>);})}
          </div>
        </Card>
        <Btn onClick={onBack} color={C.grayL} textColor={C.text} style={{width:"100%",padding:14,fontSize:15}}>Back to Dashboard</Btn>
      </div>
    </div>
  );
}
function PastPaperSummary({paper,onBack}){
  const[view,setView]=useState("list");const[reviewMistakes,setReviewMistakes]=useState([]);
  if(!paper.results||!paper.results.length){return(<div style={{minHeight:"100vh",background:C.grayL,display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"system-ui"}}><Card style={{maxWidth:400,textAlign:"center",padding:32}}><div style={{fontSize:48}}>📄</div><h2>Paper — {paper.date}</h2><div style={{fontSize:28,fontWeight:900,color:C.primary,marginBottom:12}}>{paper.score} / 40</div><div style={{fontSize:14,color:C.textL,marginBottom:16}}>No question-level data for this paper.</div><Btn onClick={onBack} style={{width:"100%"}}>Back to Dashboard</Btn></Card></div>);}
  if(view==="review")return <ReviewFlow mistakes={reviewMistakes} onDone={function(){setView("list");}}/>;
  return <QuestionList results={paper.results} score={paper.score} maxMarks={40} date={paper.date}
    onReviewAll={function(){setReviewMistakes(paper.results.filter(function(r){return !r.correct;}));setView("review");}}
    onReviewOne={function(r){setReviewMistakes([r]);setView("review");}}

}

// ── Practice session ──────────────────────────────────────────────────────────
function PracticeSession({mode,questions,onComplete,onExit}){
  const[qIdx,setQIdx]=useState(0);const[ans,setAns]=useState("");const[submitted,setSubmitted]=useState(false);const[results,setResults]=useState([]);
  const[timeLeft,setTimeLeft]=useState(mode==="timed"?720:mode==="full-paper"?1800:(mode==="custom-timed"?null:null));
  const[showSelfAssess,setShowSelfAssess]=useState(false);const[selfAssessData,setSelfAssessData]=useState(null);const[exitConfirm,setExitConfirm]=useState(false);const[done,setDone]=useState(false);const[finalResults,setFinalResults]=useState(null);
  const inputRef=useRef(null);const q=questions[qIdx];const total=questions.length;
  const noMidReview=mode==="full-paper"||mode==="timed"||mode==="custom-timed";
  const startTimeRef=useRef(Date.now());const totalSecsRef=useRef(mode==="timed"?720:mode==="full-paper"?1800:null);
  useEffect(function(){
    if(totalSecsRef.current===null)return;
    startTimeRef.current=Date.now();
    const t=setInterval(function(){
      const elapsed=Math.floor((Date.now()-startTimeRef.current)/1000);
      const rem=totalSecsRef.current-elapsed;
      if(rem<=0){clearInterval(t);setTimeLeft(0);const all=results.concat(questions.slice(results.length).map(function(qq){return Object.assign({},qq,{userAnswer:"",correct:false,marks:0});}));setFinalResults(all);setDone(true);}
      else setTimeLeft(rem);
    },250);
    return function(){clearInterval(t);};
  },[]);
  useEffect(function(){if(!submitted&&!showSelfAssess&&inputRef.current)inputRef.current.focus();},[qIdx,submitted,showSelfAssess]);
  const fmtTime=function(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");};
  const completeSession=useCallback(function(res){setFinalResults(res);setDone(true);},[]);
  const submitAns=function(){
    if(submitted||showSelfAssess)return;if(ans.trim()==="")return;
    const ua=ans.trim().replace(/,/g,"");const ok=answersMatch(ua,q.answer,q.isText);
    const isTM=TWO_MARK.has(q.topic);const marks=ok?(isTM?2:1):0;
    const rec=Object.assign({},q,{userAnswer:ua,correct:ok,marks:marks});const nr=results.concat([rec]);
    if(noMidReview&&isTM&&!ok){setResults(nr);setSelfAssessData(rec);setShowSelfAssess(true);}
    else{setResults(nr);if(!noMidReview)setSubmitted(true);else advanceWith(nr);}
  };
  const handleSelfAssess=function(gotMethod){
    const upd=Object.assign({},selfAssessData,{marks:gotMethod?1:0});
    const nr=results.map(function(r,i){return i===results.length-1?upd:r;});
    setResults(nr);setSelfAssessData(null);setShowSelfAssess(false);advanceWith(nr);
  };
  const advanceWith=function(cr){if(cr.length>=total)completeSession(cr);else{setQIdx(cr.length);setAns("");setSubmitted(false);}};
  const advanceAfterFeedback=function(){if(qIdx+1>=total)completeSession(results);else{setQIdx(qIdx+1);setAns("");setSubmitted(false);}};
  useEffect(function(){if(done&&finalResults)onComplete(finalResults);},[done,finalResults]);
  if(done)return null;
  const isCorrect=submitted&&results[results.length-1]&&results[results.length-1].correct;
  const exp=getExp(q.topic);
  if(showSelfAssess&&selfAssessData){return(<div style={{minHeight:"100vh",background:C.grayL,display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"system-ui"}}><Card style={{maxWidth:560,width:"100%"}}><div style={{background:"#fef3c7",borderRadius:8,padding:10,marginBottom:12,fontWeight:700,color:C.yellow}}>2-Mark Question — Method Check</div><p style={{marginBottom:8}}>Your answer was not correct, but you may earn 1 mark for using the right method.</p>{selfAssessData.colHint?<CombinedHintBox exp={exp} colHint={selfAssessData.colHint} hideAnswer={true}/>:selfAssessData.divHint?<DivisionExplanation dividend={selfAssessData.divHint.dividend} divisor={selfAssessData.divHint.divisor} hideAnswer={true}/>:<div style={{background:C.grayL,borderRadius:8,padding:12,fontFamily:"monospace",fontSize:13,whiteSpace:"pre-wrap",marginBottom:12}}>{selfAssessData.dynamicHint||selfAssessData.working||exp.example}</div>}<p style={{fontWeight:700,marginBottom:12}}>Did you use the correct method with only ONE arithmetic error?</p><div style={{display:"flex",gap:10}}><Btn onClick={function(){handleSelfAssess(true);}} color={C.green} style={{flex:1}}>Yes — 1 mark</Btn><Btn onClick={function(){handleSelfAssess(false);}} color={C.red} style={{flex:1}}>No — 0 marks</Btn></div></Card></div>);}
  return(
    <div style={{minHeight:"100vh",background:C.grayL,fontFamily:"system-ui"}}>
      <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
        <button onClick={function(){setExitConfirm(true);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:22,color:C.textL}}>✕</button>
        <div style={{flex:1,margin:"0 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.textL,marginBottom:4}}><span>Q{qIdx+1} of {total}</span>{timeLeft!==null&&<span style={{fontWeight:700,color:timeLeft<60?C.red:C.text}}>{fmtTime(timeLeft)}</span>}</div>
          <PBar pct={(qIdx/total)*100} color={C.primary}/>
        </div>
        <div style={{fontSize:12,fontWeight:700,color:C.primary,background:C.primaryL,padding:"4px 10px",borderRadius:99}}>{mode==="full-paper"?"Full Paper":mode==="timed"?"Timed":"Practice"}</div>
      </div>
      {exitConfirm&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}><Card style={{maxWidth:340,width:"90%",textAlign:"center"}}><h3 style={{marginBottom:8}}>Exit Practice?</h3><p style={{color:C.textL,fontSize:14,marginBottom:16}}>Your progress won't be saved.</p><div style={{display:"flex",gap:10}}><Btn onClick={onExit} color={C.red} style={{flex:1}}>Exit</Btn><Btn onClick={function(){setExitConfirm(false);}} color={C.grayL} textColor={C.text} style={{flex:1}}>Continue</Btn></div></Card></div>)}
      <div style={{maxWidth:640,margin:"0 auto",padding:20}}>
        <div style={{fontSize:13,color:C.primary,fontWeight:700,marginBottom:8}}>{TOPIC_NAMES[q.topic]||q.topic}</div>
        <QuestionCard q={q} qNum={qIdx+1} inputRef={inputRef} ansValue={ans} onAnsChange={function(e){setAns(e.target.value);}} onSubmit={submitAns} submitted={submitted} isCorrect={isCorrect}>
          {submitted&&!noMidReview&&(<div style={{padding:16,borderTop:"1px solid #e5e7eb"}}><div style={{background:isCorrect?C.greenL:C.redL,borderRadius:10,padding:14,textAlign:"center",marginBottom:isCorrect?0:12}}><div style={{fontSize:30}}>{isCorrect?"✅":"❌"}</div><div style={{fontWeight:800,color:isCorrect?C.green:C.red,fontSize:20}}>{isCorrect?"Correct! Well done!":"Not quite"}</div>{!isCorrect&&<div style={{fontSize:14,marginTop:4}}>The answer was <strong>{renderMath(String(q.answer))}</strong></div>}</div>{!isCorrect&&(<div style={{marginTop:12}}>{q.colHint?<CombinedHintBox exp={exp} colHint={q.colHint}/>:q.pvHint?<ColHintPlaceValue {...q.pvHint}/>:q.decHint?<ColHintDecSub {...q.decHint}/>:q.pvGridHint?<PlaceValueGrid {...q.pvGridHint} showArrows={true}/>:q.sdHint?<ColHintShortDiv {...q.sdHint} hideAnswer={false}/>:q.fracAddHint?<FracAddVisual {...q.fracAddHint}/>:q.fracMixedHint?<FracMixedVisual {...q.fracMixedHint}/>:q.fracSubHint?<FracSubVisual {...q.fracSubHint}/>:q.fracSubMixedHint?<FracSubMixedVisual {...q.fracSubMixedHint}/>:q.fracDivHint?<FracDivVisual {...q.fracDivHint}/>:q.decColHint?<DecimalColVisual {...q.decColHint}/>:q.divHint?null:<NoteBox exp={exp} showExample={true} dynamicHint={q.dynamicHint}/>}{q.divHint&&<DivisionExplanation dividend={q.divHint.dividend} divisor={q.divHint.divisor}/>}{(YT[q.topic]||[]).map(function(v,i){return <a key={i} href={v.url} target="_blank" rel="noreferrer" style={{display:"block",background:"#ef4444",color:"#fff",borderRadius:8,padding:"8px 14px",textDecoration:"none",fontWeight:700,fontSize:13,marginBottom:6}}>▶ Watch: {v.label}</a>;})}</div>)}<Btn onClick={advanceAfterFeedback} style={{width:"100%",marginTop:12,padding:14,fontSize:16}}>{qIdx+1<total?"Next Question":"See Results"}</Btn></div>)}
        </QuestionCard>
        {!submitted&&<Btn onClick={submitAns} style={{width:"100%",marginTop:12,padding:14,fontSize:16}}>Submit Answer</Btn>}
      </div>
    </div>
  );
}
function ResultsScreen({results,mode,onBack,onReviewAll,onReviewOne}){
  const totalMarks=results.reduce(function(s,r){return s+(r.marks||0);},0);
  const correctCount=results.filter(function(r){return r.correct;}).length;
  const score=mode==="full-paper"?totalMarks:correctCount;
  const maxMarks=mode==="full-paper"?40:results.length;
  return <QuestionList results={results} score={score} maxMarks={maxMarks} onReviewAll={onReviewAll} onReviewOne={onReviewOne} onBack={onBack}/>;
}

// ── Pupil Dashboard ───────────────────────────────────────────────────────────
function PupilDashboard({user,onUpdate,onLogout,assignments,streakSettings}){
  const[view,setView]=useState("dashboard");const[mode,setMode]=useState(null);const[questions,setQuestions]=useState([]);const[results,setResults]=useState([]);const[reviewMistakes,setReviewMistakes]=useState([]);const[pastPaperIdx,setPastPaperIdx]=useState(null);const[activeAssignment,setActiveAssignment]=useState(null);

  // My assignments (those targeting this pupil)
  const myAssignments=(assignments||[]).filter(function(a){
    const relevant=a.targetPupils==="all"||(Array.isArray(a.targetPupils)&&a.targetPupils.includes(user.name));
    const done=a.completedBy&&a.completedBy[user.name];
    return relevant&&!done;
  }).sort(function(a,b){return new Date(a.dueDate)-new Date(b.dueDate);});

  const startAssignment=function(asgn){
    setActiveAssignment(asgn);
    let qs;
    if(asgn.mode==="full-paper"){qs=generateFullPaper();}
    else if(asgn.mode==="topic"&&asgn.topic){const usedA=new Set();qs=Array.from({length:10},function(){return genQ(asgn.topic,usedA);});}
    else{qs=Object.keys(TOPIC_NAMES).sort(function(){return Math.random()-0.5;}).slice(0,10).map(function(t){return genQ(t,new Set());});}
    setQuestions(qs);setMode(asgn.mode==="timed-session"?"custom-timed":asgn.mode);setView("practice");
  };

  const startPractice=function(m,topicOverride){
    setActiveAssignment(null);
    let qs;
    if(m==="full-paper")qs=generateFullPaper();
    else if(m==="topic"&&topicOverride){const usedP=new Set();qs=Array.from({length:10},function(){return genQ(topicOverride,usedP);});}
    else qs=Object.keys(TOPIC_NAMES).sort(function(){return Math.random()-0.5;}).slice(0,10).map(function(t){return genQ(t,new Set());});
    setQuestions(qs);setMode(m);setView("practice");
  };

  const handleComplete=function(res){
    setResults(res);
    const today=isoToday();
    const updated=Object.assign({},user,{
      topicProgress:Object.assign({},user.topicProgress),
      fullPapers:(user.fullPapers||[]).slice(),
      sessions:(user.sessions||0)+1,
      practiseDates:Array.from(new Set((user.practiseDates||[]).concat([today])))
    });
    res.forEach(function(r){
      if(!updated.topicProgress[r.topic])updated.topicProgress[r.topic]={attempts:[]};
      updated.topicProgress[r.topic]=Object.assign({},updated.topicProgress[r.topic],{attempts:updated.topicProgress[r.topic].attempts.concat([r.correct?1:0])});
    });
    if(mode==="full-paper"||activeAssignment?.mode==="full-paper"){
      const tm=res.reduce(function(s,r){return s+(r.marks||0);},0);
      updated.fullPapers=updated.fullPapers.concat([{score:tm,marks:40,date:todayStr(),results:res}]);
    }
    onUpdate(updated,activeAssignment);
    setView("results");
  };

  if(view==="practice")return <PracticeSession mode={mode} questions={questions} onComplete={handleComplete} onExit={function(){setView("dashboard");}}/>;
  if(view==="results")return <ResultsScreen results={results} mode={mode} onBack={function(){setView("dashboard");}} onReviewAll={function(){setReviewMistakes(results.filter(function(r){return !r.correct;}));setView("review");}} onReviewOne={function(r){setReviewMistakes([r]);setView("review");}}/>;
  if(view==="review")return <ReviewFlow mistakes={reviewMistakes} onDone={function(){setView("results");}}/>;
  if(view==="past-paper-summary"){const p=(user.fullPapers||[])[pastPaperIdx];return <PastPaperSummary paper={p} onBack={function(){setView("dashboard");}}/>;}

  const topicProg=user.topicProgress||{};const fullPapers=user.fullPapers||[];
  const weakTopics=Object.entries(topicProg).map(function(e){return{t:e[0],pct:getTopicPct(e[1].attempts),n:e[1].attempts.length};}).filter(function(x){return x.n>=3&&x.pct!==null&&x.pct<70;}).sort(function(a,b){return a.pct-b.pct;}).slice(0,4);
  const streakCount=getStreakCount(user.practiseDates,streakSettings);
  const dueToday=myAssignments.filter(function(a){return a.dueDate===isoToday();});

  return(
    <div style={{minHeight:"100vh",background:C.grayL,fontFamily:"system-ui"}}>
      <div style={{background:C.primary,color:"#fff",padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontWeight:900,fontSize:20}}>KS2 SATs Arithmetic</div><div style={{fontSize:13,opacity:0.85}}>Welcome back, {user.name}!</div></div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {streakCount!==null&&<div style={{background:"rgba(255,255,255,0.2)",borderRadius:10,padding:"6px 12px",textAlign:"center"}}><div style={{fontSize:18}}>🔥</div><div style={{fontSize:12,fontWeight:800}}>{streakCount} day{streakCount!==1?"s":""}</div></div>}
          <Btn onClick={onLogout} color="rgba(255,255,255,0.2)" textColor="#fff" style={{fontSize:13,padding:"6px 14px"}}>Log out</Btn>
        </div>
      </div>
      <div style={{maxWidth:760,margin:"0 auto",padding:20}}>
        {myAssignments.length>0&&(
          <Card style={{marginBottom:16,border:"2px solid "+C.primary}}>
            <h3 style={{margin:"0 0 12px",color:C.primary,fontSize:16}}>📋 Your Assignments</h3>
            {myAssignments.map(function(a){
              const overdue=a.dueDate<isoToday();
              return(
                <div key={a.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:overdue?C.redL:C.primaryL,borderRadius:10,marginBottom:8,gap:12,flexWrap:"wrap"}}>
                  <div><div style={{fontWeight:700,fontSize:15}}>{a.title}</div><div style={{fontSize:12,color:overdue?C.red:C.textL}}>Due: {a.dueDate} {overdue?"⚠️ Overdue":""}</div></div>
                  <Btn onClick={function(){startAssignment(a);}} style={{padding:"8px 18px",fontSize:14}}>Start Now</Btn>
                </div>
              );
            })}
          </Card>
        )}
        <Card style={{marginBottom:16}}>
          <h3 style={{margin:"0 0 14px",fontSize:17}}>Start Practising</h3>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:12}}>
            {[{m:"quick",icon:"⚡",label:"Quick Practice",sub:"10 questions, no timer",color:C.primaryL,tc:C.primary},{m:"timed",icon:"⏱",label:"Timed Practice",sub:"10 questions, 12 mins",color:C.primaryL,tc:C.primary},{m:"full-paper",icon:"📄",label:"Full Paper",sub:"36 questions, 30 mins",color:C.primary,tc:"#fff"}].map(function(item){return(<button key={item.m} onClick={function(){startPractice(item.m);}} style={{background:item.color,color:item.tc,border:"none",borderRadius:12,padding:16,textAlign:"left",cursor:"pointer",fontFamily:"system-ui"}}><div style={{fontSize:30,marginBottom:4}}>{item.icon}</div><div style={{fontWeight:800,fontSize:15}}>{item.label}</div><div style={{fontSize:12,opacity:0.8,marginTop:2}}>{item.sub}</div></button>);})  }
          </div>
        </Card>
        <Card style={{marginBottom:16}}>
          <h3 style={{margin:"0 0 4px",fontSize:17}}>Full Paper Progress</h3>
          <p style={{fontSize:13,color:C.textL,marginBottom:12}}>Click a dot to review that paper.</p>
          <LineGraph papers={fullPapers} onClickPaper={fullPapers.length>0?function(i){setPastPaperIdx(i);setView("past-paper-summary");}:null}/>
          {fullPapers.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:12}}>{fullPapers.slice(-5).map(function(p,i){return(<button key={i} onClick={function(){setPastPaperIdx(i);setView("past-paper-summary");}} style={{background:C.primaryL,borderRadius:8,padding:"5px 12px",fontSize:13,border:"2px solid "+C.primary,cursor:"pointer",fontFamily:"system-ui"}}><strong>{p.score}/40</strong> <span style={{color:C.textL,fontSize:11}}>({p.date})</span></button>);})}</div>}
        </Card>
        {weakTopics.length>0&&(<Card style={{marginBottom:16}}><h3 style={{margin:"0 0 6px",fontSize:17}}>Suggested Areas to Improve</h3><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(175px,1fr))",gap:10}}>{weakTopics.map(function(item){return(<button key={item.t} onClick={function(){startPractice("topic",item.t);}} style={{background:"#fff",border:"2px solid "+pctColor(item.pct),borderRadius:10,padding:12,textAlign:"left",cursor:"pointer",fontFamily:"system-ui"}}><div style={{fontWeight:700,fontSize:13,marginBottom:6}}>{TOPIC_EMOJI[item.t]||"📝"} {TOPIC_NAMES[item.t]}</div><PBar pct={item.pct} color={pctColor(item.pct)}/><div style={{fontSize:12,color:pctColor(item.pct),marginTop:4,fontWeight:700}}>{item.pct}%</div></button>);})}</div></Card>)}
        <Card>
          <h3 style={{margin:"0 0 4px",fontSize:17}}>Practice by Topic</h3>
          <p style={{color:C.textL,fontSize:13,marginBottom:18}}>Click any tile for 10 focused questions.</p>
          {TOPIC_CATEGORIES.map(function(cat,ci){const cc=CAT_COLOURS[ci];return(<div key={cat.label} style={{marginBottom:24}}><div style={{fontWeight:800,fontSize:14,color:cc.heading,marginBottom:10,display:"flex",alignItems:"center",gap:8}}><div style={{flex:1,height:3,background:cc.border,borderRadius:99}}/><span style={{background:cc.bg,border:"2px solid "+cc.border,borderRadius:20,padding:"3px 14px"}}>{cat.label}</span><div style={{flex:1,height:3,background:cc.border,borderRadius:99}}/></div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))",gap:8}}>{cat.topics.map(function(t){const d=topicProg[t];const pct=d?getTopicPct(d.attempts):null;const hasVideo=(YT[t]||[]).length>0;return(<button key={t} onClick={function(){startPractice("topic",t);}} style={{background:cc.bg,border:"2px solid "+(pct!==null?pctColor(pct):cc.border),borderRadius:12,padding:"10px 12px",textAlign:"left",cursor:"pointer",fontFamily:"system-ui"}}><div style={{fontSize:22,marginBottom:4}}>{TOPIC_EMOJI[t]||"📝"}</div><div style={{fontWeight:700,fontSize:12,lineHeight:1.3,color:cc.text,marginBottom:4}}>{TOPIC_NAMES[t]}</div>{pct!==null&&<React.Fragment><PBar pct={pct} color={pctColor(pct)}/><div style={{fontSize:11,color:pctColor(pct),marginTop:3,fontWeight:700}}>{pct}%</div></React.Fragment>}{pct===null&&<div style={{fontSize:11,color:cc.text,opacity:0.6}}>Not tried yet</div>}{hasVideo&&<div style={{fontSize:10,color:"#ef4444",marginTop:3}}>Video available</div>}</button>);})}</div></div>);})}
        </Card>
      </div>
    </div>
  );
}

    .overall{font-size:28px;font-weight:900;color:#4f46e5;}

  </style></head><body>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div><h1>KS2 SATs Arithmetic — Pupil Report</h1><h2 style="margin-top:0;font-size:20px;">${p.name}</h2></div>
      <div style="text-align:right;"><div style="font-size:11px;color:#6b7280;">Printed: ${new Date().toLocaleDateString('en-GB')}</div><button onclick="window.print()" style="margin-top:8px;background:#4f46e5;color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:13px;">🖨 Print / Save PDF</button></div>
    </div>

      <div style="background:#e0e7ff;border-radius:12px;padding:16px 24px;text-align:center;"><div class="overall">${overall!==null?overall+"%" :"—"}</div><div style="font-size:12px;color:#374151;font-weight:700;">Overall Score</div></div>
      <div style="background:#f3f4f6;border-radius:12px;padding:16px 24px;text-align:center;"><div style="font-size:28px;font-weight:900;">${p.sessions||0}</div><div style="font-size:12px;color:#374151;font-weight:700;">Sessions</div></div>
      <div style="background:#f3f4f6;border-radius:12px;padding:16px 24px;text-align:center;"><div style="font-size:28px;font-weight:900;">${papers.length}</div><div style="font-size:12px;color:#374151;font-weight:700;">Full Papers</div></div>
    </div>

    ${teacherNote?`<h2>Teacher Note</h2><div style="background:#fffef5;border:1px solid #d1a054;border-radius:6px;padding:12px;font-size:13px;">${teacherNote.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>`:""}
    <div style="margin-top:32px;font-size:11px;color:#9ca3af;border-top:1px solid #e5e7eb;padding-top:12px;">KS2 SATs Arithmetic Tracker — generated ${new Date().toLocaleDateString('en-GB')}</div>
