function printClassInsights(weakAreas,heatmapData){
  const win=window.open("","_blank","width=800,height=900");
  const weakRows=weakAreas.map(function(item){return "<tr><td>"+(TOPIC_NAMES[item.topic]||item.topic)+"</td><td>"+item.avg+"%</td><td>"+item.pupils+" pupil"+(item.pupils!==1?"s":"")+"</td></tr>";}).join("");
  const heatRows=heatmapData.map(function(item){return "<tr><td>"+(TOPIC_NAMES[item.topic]||item.topic)+"</td><td>"+item.pct+"%</td><td>"+item.total+" q</td></tr>";}).join("");
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Class Insights</title><style>body{font-family:Arial,sans-serif;max-width:700px;margin:40px auto;color:#111;}h1{color:#4f46e5;border-bottom:3px solid #4f46e5;padding-bottom:8px;}h2{font-size:16px;color:#374151;margin-top:24px;}table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;}th{background:#e0e7ff;padding:8px;text-align:left;}td{padding:7px 8px;border-bottom:1px solid #f3f4f6;}@media print{button{display:none;}}</style></head><body><div style="display:flex;justify-content:space-between;align-items:flex-start;"><h1>Class Insights</h1><div><div style="font-size:11px;color:#6b7280;">Printed: ${new Date().toLocaleDateString('en-GB')}</div><button onclick="window.print()" style="margin-top:8px;background:#4f46e5;color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:13px;">🖨 Print / Save PDF</button></div></div><h2>Class Weak Areas</h2>${weakRows?`<table><tr><th>Topic</th><th>Avg %</th><th>Pupils</th></tr>${weakRows}</table>`:"<p>No data yet.</p>"}${heatRows?`<h2>Paper Heatmap</h2><table><tr><th>Topic</th><th>Accuracy</th><th>Questions</th></tr>${heatRows}</table>`:""}</body></html>`);
  win.document.close();
}

// Fix #7: sort by surname
function bySurname(name){const p=(name||"").trim().split(" ");if(p.length<2)return name.toLowerCase();return(p[p.length-1]+" "+p.slice(0,-1).join(" ")).toLowerCase();}

// ── Teacher Dashboard ─────────────────────────────────────────────────────────
function TeacherDashboard({teacher,pupils,onUpdatePupils,onLogout,assignments,onSaveAssignments,streakSettings,onSaveStreakSettings,notes,onSaveNotes}){
  const[tab,setTab]=useState("overview");const[viewPupil,setViewPupil]=useState(null);const[resetTarget,setResetTarget]=useState(null);const[newPw,setNewPw]=useState("");const[sortCol,setSortCol]=useState(null);const[sortDir,setSortDir]=useState("asc");const[weakSort,setWeakSort]=useState(null);

  // Assignment form state
  const[showNewAssignment,setShowNewAssignment]=useState(false);
  const[asgnTitle,setAsgnTitle]=useState("");const[asgnMode,setAsgnMode]=useState("full-paper");const[asgnTopic,setAsgnTopic]=useState("");const[asgnDue,setAsgnDue]=useState(isoToday());const[asgnTarget,setAsgnTarget]=useState("all");const[asgnDuration,setAsgnDuration]=useState(30);const[asgnPupils,setAsgnPupils]=useState([]);

  // Insights state
  const[heatmapFrom,setHeatmapFrom]=useState("");const[heatmapTo,setHeatmapTo]=useState("");

  // Alert threshold
  const[alertDays,setAlertDays]=useState(5);

  const getPupilStats=function(p){
    const allA=Object.values(p.topicProgress||{}).flatMap(function(d){return d.attempts||[];});
    const overall=allA.length?Math.round(allA.reduce(function(s,v){return s+v;},0)/allA.length*100):null;
    const last3=(p.fullPapers||[]).slice(-3);
    const weak=Object.entries(p.topicProgress||{}).map(function(e){return{t:e[0],pct:getTopicPct(e[1].attempts)};}).filter(function(x){return x.pct!==null&&x.pct<70;}).sort(function(a,b){return a.pct-b.pct;});
    return{allA,overall,last3,weak};
  };

  const handleColSort=function(col){
    if(sortCol===col){setSortDir(function(d){return d==="asc"?"desc":"asc";});}else{setSortCol(col);setSortDir("asc");}
    setWeakSort(null);
  };

  const sortedPupils=pupils.slice().sort(function(a,b){
    if(weakSort){const wa=getPupilStats(a).weak,wb=getPupilStats(b).weak;if(weakSort==="pct"){return(wa.length?wa[0].pct:101)-(wb.length?wb[0].pct:101);}else{return(wa.length?TOPIC_NAMES[wa[0].t]||wa[0].t:"ZZZ").localeCompare(wb.length?TOPIC_NAMES[wb[0].t]||wb[0].t:"ZZZ");}}
    if(!sortCol)return bySurname(a.name)<bySurname(b.name)?-1:bySurname(a.name)>bySurname(b.name)?1:0;
    const sa=getPupilStats(a),sb=getPupilStats(b);
    if(sortCol==="name"){return sortDir==="asc"?bySurname(a.name).localeCompare(bySurname(b.name)):bySurname(b.name).localeCompare(bySurname(a.name));}
    let va,vb;
    if(sortCol==="sessions"){va=a.sessions||0;vb=b.sessions||0;}
    else if(sortCol==="overall"){va=sa.overall!==null?sa.overall:-1;vb=sb.overall!==null?sb.overall:-1;}
    else if(sortCol==="login"){va=a.lastLogin||"0000";vb=b.lastLogin||"0000";}
    else return 0;
    return sortDir==="asc"?va<vb?-1:va>vb?1:0:vb<va?-1:vb>va?1:0;
  });

  const SortBtn=function(props){const active=sortCol===props.col&&!weakSort;return(<th onClick={function(){handleColSort(props.col);}} style={{padding:"10px 12px",textAlign:"left",fontWeight:800,color:active?C.primaryD:C.primary,whiteSpace:"nowrap",cursor:"pointer",userSelect:"none",background:active?C.primaryL:"transparent"}}>{props.label} {active?(sortDir==="asc"?"▲":"▼"):"⇅"}</th>);};

  const doReset=function(){onUpdatePupils(pupils.map(function(p){return p.name===resetTarget?Object.assign({},p,{password:newPw}):p;}));setResetTarget(null);setNewPw("");};
  const clearProgress=function(name){if(!window.confirm("Clear all progress for "+name+"?"))return;onUpdatePupils(pupils.map(function(p){return p.name===name?Object.assign({},p,{topicProgress:{},fullPapers:[],sessions:0,practiseDates:[]}):p;}));};

  const exportCSV=function(){
    const rows=[["Name","Sessions","Last Login","Overall %","Last 3 Papers","Weak Areas","Streak Days"]];
    sortedPupils.forEach(function(p){
      const st=getPupilStats(p);const last3str=st.last3.map(function(fp){return fp.score+"/40 ("+fp.date+")";}).join(" | ");
      const weakStr=st.weak.slice(0,3).map(function(x){return(TOPIC_NAMES[x.t]||x.t)+" ("+x.pct+"%)";}).join("; ");
      const streak=getStreakCount(p.practiseDates,streakSettings);
      rows.push([p.name,p.sessions||0,lastLoginLabel(p.lastLogin),(st.overall!==null?st.overall:0)+"%",last3str,weakStr,streak!==null?streak:"N/A"]);
    });
    const csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="sats-class.csv";a.click();
  };

  const saveAssignment=function(){
    if(!asgnTitle||!asgnDue)return;
    const newA={id:String(Date.now()),title:asgnTitle,mode:asgnMode,topic:asgnTopic||null,dueDate:asgnDue,duration:asgnDuration,targetPupils:asgnTarget==="all"?"all":asgnPupils,completedBy:{}};
    onSaveAssignments((assignments||[]).concat([newA]));
    setShowNewAssignment(false);setAsgnTitle("");setAsgnMode("full-paper");setAsgnTopic("");setAsgnDue(isoToday());setAsgnTarget("all");setAsgnPupils([]);
  };

  const deleteAssignment=function(id){onSaveAssignments((assignments||[]).filter(function(a){return a.id!==id;}));};

  // Class heatmap: topic accuracy for papers completed in date range
  const computeHeatmap=function(){
    if(!heatmapFrom||!heatmapTo)return[];
    const topicTotals={},topicCorrect={};
    pupils.forEach(function(p){
      (p.fullPapers||[]).forEach(function(fp){
        // convert dd/mm/yy to ISO for comparison
        if(!fp.date||!fp.results||!fp.results.length)return;
        const parts=fp.date.split("/");if(parts.length!==3)return;
        const iso="20"+parts[2]+"-"+parts[1]+"-"+parts[0];
        if(iso<heatmapFrom||iso>heatmapTo)return;
        fp.results.forEach(function(r){
          if(!topicTotals[r.topic])topicTotals[r.topic]=0;
          if(!topicCorrect[r.topic])topicCorrect[r.topic]=0;
          topicTotals[r.topic]++;if(r.correct)topicCorrect[r.topic]++;
        });
      });
    });
    return Object.entries(topicTotals).map(function(e){const t=e[0],tot=e[1];const pct=Math.round((topicCorrect[t]||0)/tot*100);return{topic:t,pct,total:tot};}).sort(function(a,b){return a.pct-b.pct;});
  };

  // Class weak areas (all pupils combined)
  const classWeakAreas=function(){
    const topicPcts={};
    pupils.forEach(function(p){
      Object.entries(p.topicProgress||{}).forEach(function(e){
        const pct=getTopicPct(e[1].attempts);if(pct===null)return;
        if(!topicPcts[e[0]])topicPcts[e[0]]=[];
        topicPcts[e[0]].push(pct);
      });
    });
    return Object.entries(topicPcts).filter(function(e){return e[1].length>=2;}).map(function(e){const avg=Math.round(e[1].reduce(function(s,v){return s+v;},0)/e[1].length);return{topic:e[0],avg,pupils:e[1].length};}).sort(function(a,b){return a.avg-b.avg;});
  };

  // Inactive pupils
  const inactivePupils=pupils.filter(function(p){const d=daysSince(p.lastLogin);return d===null||d>=alertDays;});

  // Single pupil view
  if(viewPupil){
    const p=pupils.find(function(x){return x.name===viewPupil;});
    if(!p){setViewPupil(null);return null;}
    const tp=p.topicProgress||{};
    const pupilNote=notes?notes[p.name]||"":"";
    const weak=Object.entries(tp).map(function(e){return{t:e[0],pct:getTopicPct(e[1].attempts)};}).filter(function(x){return x.pct!==null&&x.pct<76;}).sort(function(a,b){return a.pct-b.pct;}).slice(0,5);
    return(
      <div style={{minHeight:"100vh",background:C.grayL,fontFamily:"system-ui",padding:20}}>
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,flexWrap:"wrap"}}>
            <Btn onClick={function(){setViewPupil(null);}} color={C.grayL} textColor={C.text} style={{padding:"8px 14px",fontSize:14}}>← Back</Btn>
            <h2 style={{margin:0,flex:1}}>{p.name}</h2>
            <Btn onClick={function(){printPupilReport(p,notes);}} color={C.green} style={{padding:"8px 14px",fontSize:14}}>🖨 Print Report</Btn>
          </div>
          <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
            {[{label:"Sessions",val:p.sessions||0},{label:"Last Login",val:lastLoginLabel(p.lastLogin)},{label:"Overall %",val:(getPupilStats(p).overall!==null?getPupilStats(p).overall+"%":"—")},{label:"Papers",val:(p.fullPapers||[]).length}].map(function(stat){return(<div key={stat.label} style={{background:"#fff",borderRadius:10,padding:"12px 18px",boxShadow:"0 1px 6px rgba(0,0,0,0.06)",minWidth:100,textAlign:"center"}}><div style={{fontSize:22,fontWeight:900,color:C.primary}}>{stat.val}</div><div style={{fontSize:11,color:C.textL,fontWeight:700}}>{stat.label}</div></div>);})}
          </div>
          <Card style={{marginBottom:16}}><h3 style={{margin:"0 0 12px"}}>Full Paper Progress</h3><LineGraph papers={p.fullPapers||[]}/></Card>
          {weak.length>0&&(<Card style={{marginBottom:16}}><h3 style={{margin:"0 0 12px"}}>Areas to Improve</h3>{weak.map(function(item){const m=masteryLabel(item.pct);return(<div key={item.t} style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}><div style={{minWidth:180,fontSize:13,fontWeight:700}}>{TOPIC_NAMES[item.t]||item.t}</div><div style={{flex:1}}><PBar pct={item.pct} color={pctColor(item.pct)}/></div><div style={{width:44,fontSize:13,fontWeight:700,color:pctColor(item.pct),textAlign:"right"}}>{item.pct}%</div><MasteryBadge pct={item.pct}/></div>);})}</Card>)}
          <Card style={{marginBottom:16}}>
            <h3 style={{margin:"0 0 12px"}}>All Topic Progress</h3>
            {Object.keys(tp).length===0?<p style={{color:C.textL}}>No data yet.</p>:(
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>
                {Object.entries(tp).map(function(e){const t=e[0],d=e[1];const pct=getTopicPct(d.attempts);if(pct===null)return null;return(<div key={t} style={{background:C.grayL,borderRadius:8,padding:"8px 10px"}}><div style={{fontSize:12,fontWeight:700,marginBottom:4}}>{TOPIC_NAMES[t]||t}</div><PBar pct={pct} color={pctColor(pct)}/><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}><div style={{fontSize:11,color:pctColor(pct),fontWeight:700}}>{pct}%</div><MasteryBadge pct={pct}/></div></div>);}).filter(Boolean)}
              </div>
            )}
          </Card>
          <Card>
            <h3 style={{margin:"0 0 10px"}}>Teacher Notes</h3>
            <textarea value={pupilNote} onChange={function(e){const n=Object.assign({},notes||{});n[p.name]=e.target.value;onSaveNotes(n);}} placeholder="Private notes about this pupil (not visible to the pupil)..." style={{width:"100%",border:"2px solid #d1d5db",borderRadius:8,padding:10,fontSize:14,fontFamily:"system-ui",minHeight:80,resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
            <div style={{fontSize:11,color:C.textL,marginTop:4}}>Notes are private and auto-saved as you type.</div>
          </Card>
        </div>
      </div>
    );
  }

  const heatmapData=computeHeatmap();
  const weakAreas=classWeakAreas();
  const streak=streakSettings||{active:false,startDate:"",endDate:""};

  return(
    <div style={{minHeight:"100vh",background:C.grayL,fontFamily:"system-ui"}}>
      <div style={{background:C.primary,color:"#fff",padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontWeight:900,fontSize:20}}>Teacher Dashboard</div><div style={{fontSize:13,opacity:0.85}}>{teacher.name} — {pupils.length} pupil{pupils.length!==1?"s":""}</div></div>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={exportCSV} color="rgba(255,255,255,0.2)" textColor="#fff" style={{fontSize:13,padding:"6px 14px"}} disabled={pupils.length===0}>Export CSV</Btn>
          <Btn onClick={onLogout} color="rgba(255,255,255,0.15)" textColor="#fff" style={{fontSize:13,padding:"6px 14px"}}>Log out</Btn>
        </div>
      </div>

      {/* Tabs */}
      <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",overflowX:"auto",display:"flex",paddingLeft:16}}>
        {[{id:"overview",label:"📊 Overview"},{id:"pupils",label:"👥 Pupils"},{id:"assignments",label:"📋 Assignments"},{id:"insights",label:"🔍 Class Insights"},{id:"settings",label:"⚙️ Settings"}].map(function(t){return <Tab key={t.id} label={t.label} active={tab===t.id} onClick={function(){setTab(t.id);}}/>;}) }
      </div>

      <div style={{maxWidth:1100,margin:"0 auto",padding:20}}>

        {/* ── Overview tab ── */}
        {tab==="overview"&&(
          pupils.length===0?(
            <Card style={{textAlign:"center",padding:40}}><div style={{fontSize:48}}>👥</div><h3>No pupils yet</h3><p style={{color:C.textL}}>Pupils will appear here once they log in.</p></Card>
          ):(
            <React.Fragment>
              {inactivePupils.length>0&&(
                <Card style={{marginBottom:16,background:"#fff7ed",border:"2px solid #f97316"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                    <div style={{fontWeight:700,color:"#c2410c",fontSize:15}}>⚠️ {inactivePupils.length} pupil{inactivePupils.length!==1?"s":""} haven't logged in for {alertDays}+ days</div>
                    <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13}}>
                      <span style={{color:C.textL}}>Alert threshold:</span>
                      <input type="number" value={alertDays} min={1} max={30} onChange={function(e){setAlertDays(Number(e.target.value));}} style={{width:50,border:"1px solid #d1d5db",borderRadius:6,padding:"3px 6px",fontSize:13,textAlign:"center"}}/>
                      <span style={{color:C.textL}}>days</span>
                    </div>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:10}}>{inactivePupils.map(function(p){return <span key={p.name} style={{background:"#fed7aa",borderRadius:8,padding:"3px 10px",fontSize:13,fontWeight:600}}>{p.name} ({lastLoginLabel(p.lastLogin)})</span>;})}</div>
                </Card>
              )}
              <Card style={{overflowX:"auto"}}>
                <h3 style={{margin:"0 0 14px"}}>Class Overview</h3>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead>
                    <tr style={{background:C.primaryL}}>
                      <SortBtn col="name" label="Pupil"/>
                      <SortBtn col="sessions" label="Sessions"/>
                      <SortBtn col="login" label="Last Login"/>
                      <SortBtn col="overall" label="Overall %"/>
                      <th style={{padding:"10px 12px",fontWeight:800,color:C.primary}}>Mastery</th>
                      <th style={{padding:"10px 12px",textAlign:"left",fontWeight:800,color:C.primary}}>Last 3 Papers</th>
                      <th style={{padding:"10px 12px",textAlign:"left",fontWeight:800,color:C.primary}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                          <span>Weak Areas</span>
                          <button onClick={function(){setWeakSort("pct");setSortCol(null);}} style={{fontSize:10,padding:"2px 7px",borderRadius:6,border:"1px solid "+(weakSort==="pct"?C.primaryD:C.primary),background:weakSort==="pct"?C.primary:"#fff",color:weakSort==="pct"?"#fff":C.primary,cursor:"pointer",fontFamily:"system-ui",fontWeight:700}}>%</button>
                          <button onClick={function(){setWeakSort("topic");setSortCol(null);}} style={{fontSize:10,padding:"2px 7px",borderRadius:6,border:"1px solid "+(weakSort==="topic"?C.primaryD:C.primary),background:weakSort==="topic"?C.primary:"#fff",color:weakSort==="topic"?"#fff":C.primary,cursor:"pointer",fontFamily:"system-ui",fontWeight:700}}>Topic</button>
                          {weakSort&&<button onClick={function(){setWeakSort(null);}} style={{fontSize:10,padding:"2px 7px",borderRadius:6,border:"1px solid #ccc",background:"#fff",color:C.textL,cursor:"pointer",fontFamily:"system-ui"}}>✕</button>}
                        </div>
                      </th>
                      {streakSettings&&streakSettings.active&&<th style={{padding:"10px 12px",fontWeight:800,color:C.primary}}>🔥 Streak</th>}
                      <th style={{padding:"10px 12px",textAlign:"left",fontWeight:800,color:C.primary}}>Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    {sortedPupils.map(function(p,i){
                      const st=getPupilStats(p);const inactive=daysSince(p.lastLogin)>=alertDays;
                      const streakCount=streakSettings&&streakSettings.active?getStreakCount(p.practiseDates,streakSettings):null;
                      return(
                        <tr key={p.name} style={{borderBottom:"1px solid #f3f4f6",background:i%2===0?"#fafafa":"#fff"}}>
                          <td style={{padding:"10px 12px",fontWeight:700}}>{p.name}{notes&&notes[p.name]&&<span title={notes[p.name]} style={{marginLeft:6,cursor:"help",fontSize:12}}>📝</span>}</td>
                          <td style={{padding:"10px 12px"}}>{p.sessions||0}</td>
                          <td style={{padding:"10px 12px"}}><span style={{color:inactive?C.red:C.text,fontWeight:inactive?700:400}}>{lastLoginLabel(p.lastLogin)}</span></td>
                          <td style={{padding:"10px 12px"}}>{st.overall!==null?<span style={{fontWeight:700,color:pctColor(st.overall)}}>{st.overall}%</span>:<span style={{color:C.textL}}>—</span>}</td>
                          <td style={{padding:"10px 12px"}}><MasteryBadge pct={st.overall}/></td>
                          <td style={{padding:"10px 12px"}}>{st.last3.length===0?<span style={{color:C.textL,fontSize:12}}>None yet</span>:<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{st.last3.map(function(fp,j){return <span key={j} style={{background:C.primaryL,borderRadius:6,padding:"2px 8px",fontWeight:700,fontSize:12}}>{fp.score}/40</span>;})}</div>}</td>
                          <td style={{padding:"10px 12px"}}>{st.weak.length===0?<span style={{color:C.green,fontSize:12}}>On track ✓</span>:st.weak.slice(0,2).map(function(item){return <div key={item.t} style={{fontSize:11,color:pctColor(item.pct)}}>{TOPIC_NAMES[item.t]||item.t} ({item.pct}%)</div>;})}</td>
                          {streakSettings&&streakSettings.active&&<td style={{padding:"10px 12px",textAlign:"center"}}><span style={{fontWeight:700,fontSize:14}}>{streakCount!==null?streakCount+"🔥":"—"}</span></td>}
                          <td style={{padding:"10px 12px"}}><div style={{display:"flex",gap:6,flexWrap:"wrap"}}><Btn onClick={function(){setViewPupil(p.name);}} style={{padding:"4px 10px",fontSize:12}}>View</Btn><Btn onClick={function(){setResetTarget(p.name);setNewPw("");}} color="#fef3c7" textColor={C.yellow} style={{padding:"4px 10px",fontSize:12}}>Reset PW</Btn><Btn onClick={function(){clearProgress(p.name);}} color="#fee2e2" textColor={C.red} style={{padding:"4px 10px",fontSize:12}}>Clear</Btn></div></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </Card>
            </React.Fragment>
          )
        )}

        {/* ── Assignments tab ── */}
        {tab==="assignments"&&(

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h2 style={{margin:0}}>Assignments</h2>
              <Btn onClick={function(){setShowNewAssignment(true);}}>+ New Assignment</Btn>
            </div>
            {showNewAssignment&&(
              <Card style={{marginBottom:20,border:"2px solid "+C.primary}}>
                <h3 style={{margin:"0 0 14px",color:C.primary}}>Create Assignment</h3>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                  <div>
                    <label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:4}}>Title</label>
                    <input value={asgnTitle} onChange={function(e){setAsgnTitle(e.target.value);}} placeholder="e.g. Week 5 Full Paper" style={{width:"100%",border:"2px solid #d1d5db",borderRadius:8,padding:"8px 12px",fontSize:14,boxSizing:"border-box",outline:"none"}}/>
                  </div>
                  <div>
                    <label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:4}}>Due Date</label>
                    <input type="date" value={asgnDue} onChange={function(e){setAsgnDue(e.target.value);}} style={{width:"100%",border:"2px solid #d1d5db",borderRadius:8,padding:"8px 12px",fontSize:14,boxSizing:"border-box",outline:"none"}}/>
                  </div>
                  <div>
                    <label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:4}}>Type</label>
                    <select value={asgnMode} onChange={function(e){setAsgnMode(e.target.value);}} style={{width:"100%",border:"2px solid #d1d5db",borderRadius:8,padding:"8px 12px",fontSize:14,outline:"none"}}>
                      <option value="full-paper">Full Arithmetic Paper (36 questions)</option>
                      <option value="quick">Quick Practice (10 questions)</option>
                      <option value="timed">Timed Practice (10 questions, 12 mins)</option>
                      <option value="timed-session">Timed Session (open practice with timer)</option>

                  {asgnMode==="topic"&&(

                        <option value="">Select topic...</option>
                        {Object.entries(TOPIC_NAMES).map(function(e){return <option key={e[0]} value={e[0]}>{e[1]}</option>;})}

                    </div>
                  )}
                  {asgnMode==="timed-session"&&(
                    <div>
                      <label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:4}}>Duration (minutes)</label>
                      <input type="number" value={asgnDuration} min={5} max={120} onChange={function(e){setAsgnDuration(Number(e.target.value));}} style={{width:"100%",border:"2px solid #d1d5db",borderRadius:8,padding:"8px 12px",fontSize:14,boxSizing:"border-box",outline:"none"}}/>
                    </div>
                  )}
                  <div>
                    <label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:4}}>Set for</label>
                    <select value={asgnTarget} onChange={function(e){setAsgnTarget(e.target.value);}} style={{width:"100%",border:"2px solid #d1d5db",borderRadius:8,padding:"8px 12px",fontSize:14,outline:"none"}}>
                      <option value="all">Whole Class</option>
                      <option value="individual">Individual Pupils</option>
                    </select>
                  </div>
                </div>
                {asgnTarget==="individual"&&(
                  <div style={{marginBottom:12}}>
                    <label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:8}}>Select Pupils</label>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:6}}>
                      {pupils.map(function(p){const checked=asgnPupils.includes(p.name);return(<label key={p.name} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",background:checked?C.primaryL:"#f9fafb",border:"2px solid "+(checked?C.primary:"#e5e7eb"),borderRadius:8,padding:"6px 10px",fontSize:13,fontWeight:checked?700:400}}><input type="checkbox" checked={checked} onChange={function(){setAsgnPupils(function(prev){return checked?prev.filter(function(n){return n!==p.name;}):prev.concat([p.name]);});}} style={{accentColor:C.primary}}/>{p.name}</label>);}) }
                    </div>
                  </div>
                )}
                <div style={{display:"flex",gap:10}}>
                  <Btn onClick={saveAssignment} disabled={!asgnTitle||!asgnDue||(asgnMode==="topic"&&!asgnTopic)||(asgnTarget==="individual"&&asgnPupils.length===0)}>Save Assignment</Btn>
                  <Btn onClick={function(){setShowNewAssignment(false);}} color={C.grayL} textColor={C.text}>Cancel</Btn>
                </div>
              </Card>
            )}
            {(assignments||[]).length===0?<Card style={{textAlign:"center",padding:32,color:C.textL}}>No assignments yet. Click "+ New Assignment" to create one.</Card>:(
              (assignments||[]).slice().reverse().map(function(a){
                const targetLabel=a.targetPupils==="all"?"Whole class":(Array.isArray(a.targetPupils)?a.targetPupils.join(", "):"");
                const completedCount=Object.keys(a.completedBy||{}).length;
                const total=a.targetPupils==="all"?pupils.length:(Array.isArray(a.targetPupils)?a.targetPupils.length:0);
                const overdue=a.dueDate<isoToday();
                return(
                  <Card key={a.id} style={{marginBottom:12,border:"1px solid "+(overdue?"#fca5a5":"#e5e7eb")}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
                      <div>
                        <div style={{fontWeight:800,fontSize:16}}>{a.title}</div>
                        <div style={{fontSize:13,color:C.textL,marginTop:2}}>
                          {a.mode==="full-paper"?"Full Paper":a.mode==="quick"?"Quick Practice":a.mode==="timed"?"Timed Practice":a.mode==="timed-session"?"Timed Session ("+a.duration+"min)":a.topic?(TOPIC_NAMES[a.topic]||a.topic):"Practice"}
                          {" · "}{targetLabel}{" · Due: "}{a.dueDate}
                          {overdue&&<span style={{color:C.red,fontWeight:700}}> ⚠️ Overdue</span>}
                        </div>
                        <div style={{marginTop:6}}>
                          <div style={{fontSize:12,color:C.textL,marginBottom:3}}>Completed: {completedCount} / {total}</div>
                          <div style={{width:200,height:6,background:"#e5e7eb",borderRadius:99}}><div style={{width:(total?completedCount/total*100:0)+"%",background:C.green,height:"100%",borderRadius:99}}/></div>
                        </div>
                        {completedCount>0&&<div style={{fontSize:11,color:C.textL,marginTop:4}}>✅ {Object.keys(a.completedBy||{}).join(", ")}</div>}
                      </div>
                      <Btn onClick={function(){deleteAssignment(a.id);}} color="#fee2e2" textColor={C.red} style={{padding:"4px 10px",fontSize:12}}>Delete</Btn>
                    </div>
                  </Card>
                );
              })
            )}
          </React.Fragment>
        )}

        {/* ── Insights tab ── */}
        {tab==="insights"&&(
          <React.Fragment>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
              <Card>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <h3 style={{margin:0,fontSize:16}}>Class Weak Areas</h3>
                  <Btn onClick={function(){printClassInsights(weakAreas,heatmapData);}} color={C.grayL} textColor={C.text} style={{fontSize:12,padding:"4px 10px"}}>🖨 Print Insights</Btn>
                </div>
                <p style={{fontSize:13,color:C.textL,marginBottom:12}}>Averaged across all pupils with 2+ attempts.</p>
                {weakAreas.length===0?<p style={{color:C.textL,fontSize:13}}>Not enough data yet.</p>:weakAreas.slice(0,10).map(function(item){return(
                  <div key={item.topic} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                      <span style={{fontSize:13,fontWeight:700}}>{TOPIC_NAMES[item.topic]||item.topic}</span>
                      <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:12,color:pctColor(item.avg),fontWeight:700}}>{item.avg}%</span><MasteryBadge pct={item.avg}/></div>
                    </div>
                    <PBar pct={item.avg} color={pctColor(item.avg)}/>
                    <div style={{fontSize:10,color:C.textL,marginTop:2}}>{item.pupils} pupil{item.pupils!==1?"s":""} have data</div>
                  </div>
                );})}
              </Card>
              <Card>
                <h3 style={{margin:"0 0 14px",fontSize:16}}>Class Paper Heatmap</h3>
                <p style={{fontSize:13,color:C.textL,marginBottom:8}}>Topic accuracy for papers completed in a date range.</p>
                <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
                  <input type="date" value={heatmapFrom} onChange={function(e){setHeatmapFrom(e.target.value);}} style={{border:"2px solid #d1d5db",borderRadius:8,padding:"6px 10px",fontSize:13,outline:"none"}}/>
                  <span style={{color:C.textL}}>to</span>
                  <input type="date" value={heatmapTo} onChange={function(e){setHeatmapTo(e.target.value);}} style={{border:"2px solid #d1d5db",borderRadius:8,padding:"6px 10px",fontSize:13,outline:"none"}}/>
                </div>
                {heatmapData.length===0?<p style={{color:C.textL,fontSize:13}}>{heatmapFrom&&heatmapTo?"No papers found in that range.":"Select a date range to see results."}</p>:heatmapData.map(function(item){
                  const heat=item.pct>=80?"#dcfce7":item.pct>=60?"#fef3c7":item.pct>=40?"#fed7aa":"#fee2e2";
                  return(
                    <div key={item.topic} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"5px 8px",background:heat,borderRadius:6}}>
                      <div style={{width:40,height:16,background:item.pct>=80?"#16a34a":item.pct>=60?"#d97706":item.pct>=40?"#ea580c":"#dc2626",borderRadius:3,opacity:0.85}}/>
                      <span style={{fontSize:13,fontWeight:700,flex:1}}>{TOPIC_NAMES[item.topic]||item.topic}</span>
                      <span style={{fontSize:13,fontWeight:700}}>{item.pct}%</span>
                      <span style={{fontSize:11,color:C.textL}}>({item.total})</span>
                    </div>
                  );
                })}
              </Card>
            </div>
          </React.Fragment>
        )}

        {/* ── Settings tab ── */}
        {tab==="pupils"&&(
          <PupilManagementPanel
            teacher={teacher}
            pupils={pupils}
            onRefresh={async function(){
              const ps=await sbGetPupils(teacher.id);
              onUpdatePupils(ps);
            }}
          />
        )}
        {tab==="settings"&&(
          <React.Fragment>
            <Card style={{maxWidth:520,marginBottom:20}}>
              <h3 style={{margin:"0 0 8px",fontSize:16}}>🔥 Streak Challenge</h3>
              <p style={{fontSize:13,color:C.textL,marginBottom:16}}>Set a date range to activate a streak challenge. Pupils will see a flame counter showing how many days they've practised within the window. Deactivate it after the challenge ends.</p>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                <span style={{fontSize:14,fontWeight:700}}>Active</span>
                <button onClick={function(){onSaveStreakSettings(Object.assign({},streak,{active:!streak.active}));}} style={{width:48,height:26,background:streak.active?C.green:"#d1d5db",borderRadius:99,border:"none",cursor:"pointer",position:"relative",transition:"background 0.2s"}}>
                  <div style={{width:20,height:20,background:"#fff",borderRadius:"50%",position:"absolute",top:3,left:streak.active?24:4,transition:"left 0.2s"}}/>
                </button>
                <span style={{fontSize:13,color:C.textL}}>{streak.active?"On":"Off"}</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
                <div>
                  <label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:4}}>Start Date</label>
                  <input type="date" value={streak.startDate} onChange={function(e){onSaveStreakSettings(Object.assign({},streak,{startDate:e.target.value}));}} style={{width:"100%",border:"2px solid #d1d5db",borderRadius:8,padding:"8px 12px",fontSize:14,boxSizing:"border-box",outline:"none"}}/>
                </div>
                <div>
                  <label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:4}}>End Date</label>
                  <input type="date" value={streak.endDate} onChange={function(e){onSaveStreakSettings(Object.assign({},streak,{endDate:e.target.value}));}} style={{width:"100%",border:"2px solid #d1d5db",borderRadius:8,padding:"8px 12px",fontSize:14,boxSizing:"border-box",outline:"none"}}/>
                </div>
              </div>
              {streak.active&&streak.startDate&&streak.endDate&&<div style={{background:C.greenL,borderRadius:8,padding:10,fontSize:13,color:C.green,fontWeight:600}}>✅ Streak challenge active: {streak.startDate} → {streak.endDate}</div>}
            </Card>
          </React.Fragment>
        )}
      </div>

      {/* Reset password modal */}
      {resetTarget&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <Card style={{maxWidth:360,width:"90%"}}>
            <h3 style={{marginBottom:12}}>Reset Password — {resetTarget}</h3>
            <input value={newPw} onChange={function(e){setNewPw(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter"&&newPw)doReset();}} placeholder="New password" style={{width:"100%",border:"2px solid #d1d5db",borderRadius:8,padding:"10px 14px",fontSize:15,boxSizing:"border-box",marginBottom:12,fontFamily:"inherit",outline:"none"}}/>
            <div style={{display:"flex",gap:10}}>
              <Btn onClick={doReset} disabled={!newPw} style={{flex:1}}>Reset</Btn>
              <Btn onClick={function(){setResetTarget(null);}} color={C.grayL} textColor={C.text} style={{flex:1}}>Cancel</Btn>
            </div>
          </Card>
        </div>
      )}
    </div>
  );
}

// ── Login ─────────────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const[tab,setTab]=useState("pupil");
  const[teachers,setTeachers]=useState([]);
  const[selectedTeacher,setSelectedTeacher]=useState("");
  const[pupils,setPupils]=useState([]);
  const[selectedPupil,setSelectedPupil]=useState("");
  const[username,setUsername]=useState("");
  const[pw,setPw]=useState("");
  const[error,setError]=useState("");
  const[loading,setLoading]=useState(false);
  const[loadingPupils,setLoadingPupils]=useState(false);
  const[loadingTeachers,setLoadingTeachers]=useState(true);

  useEffect(function(){
    sbGetAllTeachers().then(function(ts){setTeachers(ts);setLoadingTeachers(false);}).catch(function(){setError("Could not connect — check your internet connection.");setLoadingTeachers(false);});
  },[]);

  useEffect(function(){
    if(!selectedTeacher){setPupils([]);return;}
    setLoadingPupils(true);setSelectedPupil("");
    sbGetPupils(selectedTeacher).then(function(ps){setPupils(ps);setLoadingPupils(false);}).catch(function(){setLoadingPupils(false);});
  },[selectedTeacher]);

  const handlePupilLogin=async function(){
    if(!selectedPupil||!pw.trim()){setError("Please select your name and enter your password.");return;}
    setLoading(true);setError("");
    try{
      const pupil=pupils.find(function(p){return p.id===selectedPupil;});
      if(!pupil){setError("Pupil not found.");setLoading(false);return;}
      if(pupil.password!==pw){setError("Incorrect password — try again.");setLoading(false);return;}
      const progress=await sbGetScores(pupil.id);
      const user=Object.assign({},pupil,{topicProgress:progress,practiseDates:[],sessions:0,lastLogin:isoToday(),fullPapers:[]});
      onLogin("pupil",user,pupils,"supabase");
    }catch(e){setError("Login error — please try again.");}
    setLoading(false);
  };

  const handleStaffLogin=async function(){
    if(!username.trim()||!pw.trim()){setError("Please enter your username and password.");return;}
    setLoading(true);setError("");
    try{
      const user=await sbLoginTeacher(username.trim(),pw);
      if(!user){setError("Incorrect username or password.");setLoading(false);return;}
      if(user.role==="admin"){
        const all=await sbGetAllUsers();
        onLogin("admin",user,all,"supabase");
      } else {
        const ps=await sbGetPupils(user.id);
        onLogin("teacher",user,ps,"supabase");
      }
    }catch(e){setError("Login error — please try again.");}
    setLoading(false);
  };

  const inp={width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:15,fontFamily:"system-ui",outline:"none",background:"#fff"};
  const btn={width:"100%",padding:"12px 0",background:C.primary,color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:15,cursor:"pointer",marginTop:4};
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#667eea 0%,#764ba2 100%)",padding:16}}>
      <div style={{marginBottom:24,textAlign:"center"}}>
        <div style={{fontSize:30,fontWeight:800,color:"#fff",letterSpacing:-0.5}}>SATs Arithmetic Tracker</div>
        <div style={{fontSize:14,color:"rgba(255,255,255,0.85)",marginTop:4}}>KS2 Arithmetic Practice</div>
      </div>
      <div style={{background:"#fff",borderRadius:16,padding:"28px 24px",maxWidth:380,width:"100%",boxShadow:"0 8px 32px rgba(0,0,0,0.18)"}}>
        <div style={{display:"flex",borderBottom:"1.5px solid #f0f0f0",marginBottom:20}}>
          {[["pupil","Pupil"],["staff","Teacher / Admin"]].map(function(t){return(
            <button key={t[0]} onClick={function(){setTab(t[0]);setError("");setPw("");}} style={{flex:1,padding:"9px 0",border:"none",background:"none",fontWeight:tab===t[0]?700:400,color:tab===t[0]?C.primary:"#888",borderBottom:tab===t[0]?"2.5px solid "+C.primary:"2.5px solid transparent",cursor:"pointer",fontSize:14,fontFamily:"system-ui"}}>
              {t[1]}
            </button>
          );})}
        </div>
        {tab==="pupil"?(
          <div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:13,color:"#555",display:"block",marginBottom:5,fontWeight:500}}>Your class</label>
              <select value={selectedTeacher} onChange={function(e){setSelectedTeacher(e.target.value);}} style={Object.assign({},inp,{color:selectedTeacher?"#1a1a1a":"#999"})}>
                <option value="">{loadingTeachers?"Loading classes...":"— choose your class —"}</option>
                {teachers.map(function(t){return <option key={t.id} value={t.id}>{t.name} {t.surname}{t.class_name?" ("+t.class_name+")":""}</option>;})}
              </select>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:13,color:"#555",display:"block",marginBottom:5,fontWeight:500}}>Your name</label>
              <select value={selectedPupil} onChange={function(e){setSelectedPupil(e.target.value);}} disabled={!selectedTeacher||loadingPupils} style={Object.assign({},inp,{color:selectedPupil?"#1a1a1a":"#999"})}>
                <option value="">{loadingPupils?"Loading pupils...":!selectedTeacher?"Select your class first":"— choose your name —"}</option>
                {pupils.map(function(p){return <option key={p.id} value={p.id}>{p.surname}, {p.firstName}</option>;})}
              </select>
            </div>
            <div style={{marginBottom:18}}>
              <label style={{fontSize:13,color:"#555",display:"block",marginBottom:5,fontWeight:500}}>Password</label>
              <input type="password" value={pw} onChange={function(e){setPw(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")handlePupilLogin();}} placeholder="Enter your password" style={inp}/>
            </div>
            {error&&<div style={{color:"#c53030",fontSize:13,marginBottom:12,background:"#fff5f5",padding:"8px 12px",borderRadius:6,border:"1px solid #fed7d7"}}>{error}</div>}
            <button onClick={handlePupilLogin} disabled={loading} style={btn}>{loading?"Logging in...":"Log in"}</button>
            <div style={{fontSize:12,color:"#aaa",textAlign:"center",marginTop:12}}>Forgotten your password? Ask your teacher.</div>
          </div>
        ):(
          <div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:13,color:"#555",display:"block",marginBottom:5,fontWeight:500}}>Username</label>
              <input type="text" value={username} onChange={function(e){setUsername(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")handleStaffLogin();}} placeholder="Your username" style={inp} autoCapitalize="none"/>
            </div>
            <div style={{marginBottom:18}}>
              <label style={{fontSize:13,color:"#555",display:"block",marginBottom:5,fontWeight:500}}>Password</label>
              <input type="password" value={pw} onChange={function(e){setPw(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")handleStaffLogin();}} placeholder="Your password" style={inp}/>
            </div>
            {error&&<div style={{color:"#c53030",fontSize:13,marginBottom:12,background:"#fff5f5",padding:"8px 12px",borderRadius:6,border:"1px solid #fed7d7"}}>{error}</div>}
            <button onClick={handleStaffLogin} disabled={loading} style={btn}>{loading?"Logging in...":"Log in"}</button>
            <div style={{fontSize:12,color:"#aaa",textAlign:"center",marginTop:12}}>Forgotten your password? Contact your admin.</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Admin Dashboard ───────────────────────────────────────────────────────────
function AdminDashboard({admin,allUsers,onLogout}){
  const[users,setUsers]=useState(allUsers||[]);
  const[tab,setTab]=useState("teachers");
  const[showAdd,setShowAdd]=useState(false);
  const[form,setForm]=useState({name:"",surname:"",username:"",password:"",class_name:""});
  const[resetTarget,setResetTarget]=useState(null);
  const[newPw,setNewPw]=useState("");
  const[msg,setMsg]=useState("");
  const[loading,setLoading]=useState(false);

  const teachers=users.filter(function(u){return u.role==="teacher";});

  const refreshUsers=async function(){
    const all=await sbGetAllUsers();setUsers(all);

    if(!form.name.trim()||!form.surname.trim()||!form.username.trim()||!form.password.trim()){setMsg("Please fill in all fields.");return;}
    setLoading(true);
    try{
      await sbCreateTeacher(form.name.trim(),form.surname.trim(),form.username.trim(),form.password.trim(),form.class_name.trim());

    try{

        </div>
      </div>
      <div style={{maxWidth:800,margin:"0 auto",padding:"24px 16px"}}>
        {msg&&<div style={{background:"#ebf8ff",border:"1px solid #90cdf4",borderRadius:8,padding:"10px 14px",marginBottom:16,color:"#2b6cb0",fontSize:14}}>{msg}<button onClick={function(){setMsg("");}} style={{float:"right",background:"none",border:"none",cursor:"pointer",color:"#2b6cb0"}}>✕</button></div>}
        <div style={{display:"flex",gap:8,marginBottom:20}}>

        </div>
        <div style={{background:"#fff",borderRadius:12,border:"1px solid #eee",overflow:"hidden"}}>
          <div style={{padding:"16px 20px",borderBottom:"1px solid #eee",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontWeight:700,fontSize:16}}>Teacher Accounts ({teachers.length})</div>
            <button onClick={function(){setShowAdd(!showAdd);}} style={{background:"#4f46e5",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontWeight:600,fontSize:14}}>+ Add Teacher</button>
          </div>

                <div><label style={{fontSize:12,color:"#666",display:"block",marginBottom:3}}>Surname</label><input value={form.surname} onChange={function(e){setForm(Object.assign({},form,{surname:e.target.value}));}} placeholder="e.g. Macey" style={inp}/></div>

// ── Pupil Management Modal ────────────────────────────────────────────────────
function PupilManagementPanel({teacher,pupils,onRefresh}){
  const[showAdd,setShowAdd]=useState(false);
  const[form,setForm]=useState({name:"",surname:"",password:""});
  const[resetTarget,setResetTarget]=useState(null);
  const[newPw,setNewPw]=useState("");
  const[msg,setMsg]=useState("");
  const[loading,setLoading]=useState(false);
  const[csvText,setCsvText]=useState("");
  const[showCsv,setShowCsv]=useState(false);

  const handleAddPupil=async function(){
    if(!form.name.trim()||!form.surname.trim()||!form.password.trim()){setMsg("Please fill in all fields.");return;}
    setLoading(true);
    try{
      await sbSavePupil(teacher.id,teacher.class_name,{name:form.name.trim()+" "+form.surname.trim(),password:form.password.trim()});
      setMsg("Pupil added!");setForm({name:"",surname:"",password:""});setShowAdd(false);
      await onRefresh();
    }catch(e){setMsg("Error adding pupil.");}
    setLoading(false);
  };

  const handleResetPw=async function(){
    if(!newPw.trim())return;
    setLoading(true);
    try{
      await sbUpdatePassword(resetTarget,newPw.trim());
      setMsg("Password reset!");setResetTarget(null);setNewPw("");
    }catch(e){setMsg("Error resetting password.");}
    setLoading(false);
  };

  const handleDelete=async function(id,name){
    if(!window.confirm("Remove "+name+" from your class? Their scores will also be deleted."))return;
    setLoading(true);
    try{await sbDeletePupil(id);await onRefresh();setMsg("Pupil removed.");}
    catch(e){setMsg("Error removing pupil.");}
    setLoading(false);
  };

  const handleCsvImport=async function(){
    const lines=csvText.trim().split("
").filter(function(l){return l.trim();});
    if(!lines.length){setMsg("No data found. Enter one pupil per line: Firstname, Surname, Password");return;}
    setLoading(true);let added=0;let errors=0;
    for(const line of lines){
      const parts=line.split(",").map(function(p){return p.trim();});
      if(parts.length<2)continue;
      const firstName=parts[0],surname=parts[1],password=parts[2]||"sats2025";
      try{await sbSavePupil(teacher.id,teacher.class_name,{name:firstName+" "+surname,password});added++;}
      catch(e){errors++;}
    }
    await onRefresh();setCsvText("");setShowCsv(false);
    setMsg("Imported "+added+" pupils"+(errors>0?" ("+errors+" errors)":"")+".");
    setLoading(false);
  };

  const inp={width:"100%",padding:"9px 11px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,fontFamily:"system-ui",marginBottom:10};
  return(
    <div>
      {msg&&<div style={{background:"#ebf8ff",border:"1px solid #90cdf4",borderRadius:8,padding:"10px 14px",marginBottom:14,color:"#2b6cb0",fontSize:13,display:"flex",justifyContent:"space-between"}}><span>{msg}</span><button onClick={function(){setMsg("");}} style={{background:"none",border:"none",cursor:"pointer",color:"#2b6cb0"}}>✕</button></div>}
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        <button onClick={function(){setShowAdd(!showAdd);setShowCsv(false);}} style={{background:"#4f46e5",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontWeight:600,fontSize:14}}>+ Add pupil</button>
        <button onClick={function(){setShowCsv(!showCsv);setShowAdd(false);}} style={{background:"#f0f0f0",color:"#333",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:14}}>📋 Batch import (CSV)</button>
      </div>
      {showAdd&&(
        <div style={{background:"#f8f9ff",borderRadius:10,padding:"16px",marginBottom:16,border:"1px solid #e8e8f5"}}>
          <div style={{fontWeight:600,marginBottom:10,fontSize:14}}>Add a pupil</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 10px"}}>
            <div><label style={{fontSize:12,color:"#666",display:"block",marginBottom:3}}>First name</label><input value={form.name} onChange={function(e){setForm(Object.assign({},form,{name:e.target.value}));}} placeholder="e.g. Emma" style={inp}/></div>
            <div><label style={{fontSize:12,color:"#666",display:"block",marginBottom:3}}>Surname</label><input value={form.surname} onChange={function(e){setForm(Object.assign({},form,{surname:e.target.value}));}} placeholder="e.g. Smith" style={inp}/></div>
            <div><label style={{fontSize:12,color:"#666",display:"block",marginBottom:3}}>Password</label><input value={form.password} onChange={function(e){setForm(Object.assign({},form,{password:e.target.value}));}} placeholder="e.g. sats2025" style={inp}/></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={handleAddPupil} disabled={loading} style={{background:"#4f46e5",color:"#fff",border:"none",borderRadius:8,padding:"8px 18px",cursor:"pointer",fontWeight:600,fontSize:14}}>{loading?"Adding...":"Add pupil"}</button>
            <button onClick={function(){setShowAdd(false);}} style={{background:"#f0f0f0",color:"#333",border:"none",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontSize:14}}>Cancel</button>
          </div>
        </div>
      )}
      {showCsv&&(
        <div style={{background:"#fffef5",borderRadius:10,padding:"16px",marginBottom:16,border:"1px solid #f5e8b0"}}>
          <div style={{fontWeight:600,marginBottom:6,fontSize:14}}>Batch import from CSV</div>
          <div style={{fontSize:12,color:"#888",marginBottom:8}}>One pupil per line: <code>Firstname, Surname, Password</code> — password is optional (defaults to "sats2025")</div>
          <textarea value={csvText} onChange={function(e){setCsvText(e.target.value);}} rows={6} placeholder={"Emma, Smith, sunshine7
Liam, Jones, football3
Olivia, Chen"} style={{width:"100%",padding:"10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:13,fontFamily:"monospace",marginBottom:10,resize:"vertical"}}/>
          <div style={{display:"flex",gap:8}}>
            <button onClick={handleCsvImport} disabled={loading||!csvText.trim()} style={{background:"#4f46e5",color:"#fff",border:"none",borderRadius:8,padding:"8px 18px",cursor:"pointer",fontWeight:600,fontSize:14}}>{loading?"Importing...":"Import"}</button>
            <button onClick={function(){setShowCsv(false);setCsvText("");}} style={{background:"#f0f0f0",color:"#333",border:"none",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontSize:14}}>Cancel</button>
          </div>
        </div>
      )}
      {resetTarget&&(
        <div style={{background:"#fffbeb",borderRadius:10,padding:"14px",marginBottom:14,border:"1px solid #fcd34d"}}>
          <div style={{fontWeight:600,marginBottom:8,fontSize:14}}>Reset password for {(pupils.find(function(p){return p.id===resetTarget;})||{}).firstName||"pupil"}</div>
          <div style={{display:"flex",gap:8}}>
            <input value={newPw} onChange={function(e){setNewPw(e.target.value);}} placeholder="New password" style={{flex:1,padding:"8px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14}}/>
            <button onClick={handleResetPw} disabled={loading} style={{background:"#4f46e5",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontWeight:600,fontSize:14}}>Save</button>
            <button onClick={function(){setResetTarget(null);setNewPw("");}} style={{background:"#f0f0f0",color:"#333",border:"none",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontSize:14}}>Cancel</button>
          </div>
        </div>
      )}
      {pupils.length===0?(
        <div style={{textAlign:"center",padding:"32px",color:"#999",fontSize:14}}>No pupils yet — add some above.</div>
      ):(
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr style={{background:"#f8f9fc"}}>{["Name","Password","Actions"].map(function(h){return <th key={h} style={{padding:"9px 14px",textAlign:"left",fontSize:13,color:"#555",fontWeight:600,borderBottom:"1px solid #eee"}}>{h}</th>;})}</tr></thead>
          <tbody>
            {pupils.slice().sort(function(a,b){return a.surname.localeCompare(b.surname);}).map(function(p){return(
              <tr key={p.id} style={{borderBottom:"1px solid #f5f5f5"}}>
                <td style={{padding:"10px 14px",fontSize:14}}>{p.surname}, {p.firstName}</td>
                <td style={{padding:"10px 14px",fontSize:13,color:"#888",fontFamily:"monospace"}}>{p.password}</td>
                <td style={{padding:"10px 14px",display:"flex",gap:6}}>
                  <button onClick={function(){setResetTarget(p.id);setMsg("");}} style={{background:"#f0f0f0",border:"none",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12}}>Reset password</button>
                  <button onClick={function(){handleDelete(p.id,p.firstName+" "+p.surname);}} style={{background:"#fff5f5",color:"#c53030",border:"1px solid #fed7d7",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12}}>Remove</button>
                </td>
              </tr>
            );})}
          </tbody>
        </table>
      )}
    </div>
  );
}

// ── App root ──────────────────────────────────────────────────────────────────
function App(){
  const[session,setSession]=useState(null);
  const[assignments,setAssignments]=useState([]);
  const[streakSettings,setStreakSettings]=useState({active:false,startDate:"",endDate:""});
  const[notes,setNotes]=useState({});

  useEffect(function(){
    load("sats-assignments",[]).then(setAssignments);
    load("sats-streak-settings",{active:false,startDate:"",endDate:""}).then(setStreakSettings);
    load("sats-notes",{}).then(setNotes);
  },[]);

  const handleLogin=function(role,user,users,key){setSession({role,user,users,key});};
  const handleLogout=function(){setSession(null);};

  const updateUser=async function(updated,completedAssignment){
    if(updated.id&&updated.topicProgress){
      sbSaveScores(updated.id,updated.topicProgress).catch(function(e){console.error("Score save:",e);});
    }
    const nu=session.users.map(function(u){return u.id===updated.id?updated:u;});
    let newAssignments=assignments;
    if(completedAssignment){
      newAssignments=assignments.map(function(a){
        if(a.id!==completedAssignment.id)return a;
        const cb=Object.assign({},a.completedBy||{});cb[updated.name]=isoToday();
        return Object.assign({},a,{completedBy:cb});
      });
      setAssignments(newAssignments);await save("sats-assignments",newAssignments);
    }
    setSession(function(s){return Object.assign({},s,{user:updated,users:nu});});
  };

  const updatePupils=async function(np){
    setSession(function(s){return Object.assign({},s,{users:np});});
  };

  const saveAssignments=async function(a){setAssignments(a);await save("sats-assignments",a);};
  const saveStreakSettings=async function(s){setStreakSettings(s);await save("sats-streak-settings",s);};
  const saveNotes=async function(n){setNotes(n);await save("sats-notes",n);};

  if(!session)return <LoginScreen onLogin={handleLogin}/>;
  if(session.role==="pupil")return <PupilDashboard user={session.user} onUpdate={updateUser} onLogout={handleLogout} assignments={assignments} streakSettings={streakSettings}/>;
  if(session.role==="teacher")return <TeacherDashboard teacher={session.user} pupils={session.users.filter(function(u){return u.role!=="teacher";})} onUpdatePupils={updatePupils} onLogout={handleLogout} assignments={assignments} onSaveAssignments={saveAssignments} streakSettings={streakSettings} onSaveStreakSettings={saveStreakSettings} notes={notes} onSaveNotes={saveNotes}/>;
  if(session.role==="admin")return <AdminDashboard admin={session.user} allUsers={session.users} onLogout={handleLogout}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App, null));
</script>
